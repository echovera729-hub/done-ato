<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sage — Personal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f4f6f1;font-family:'Manrope',-apple-system,sans-serif;color:#26352a;min-height:100vh;}
input,button,textarea{font-family:inherit;}
input::placeholder,textarea::placeholder{color:#a7b2a0;}
button{cursor:pointer;}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cfd8c8;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#b9c4ad}

/* Animations */
@keyframes confetti-fall{0%{transform:translateY(-12px) rotate(0);opacity:0}8%{opacity:1}100%{transform:translateY(620px) rotate(540deg);opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popin{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}

/* Layout */
.app{display:flex;height:100vh;width:100%;overflow:hidden;}

/* Sidebar */
.sidebar{width:252px;flex:none;background:#fff;border-right:1px solid #e7ebe2;display:flex;flex-direction:column;padding:26px 18px 22px;}
.logo{display:flex;align-items:center;gap:11px;padding:0 8px 4px;margin-bottom:22px;}
.logo-icon{width:38px;height:38px;flex:none;background:#3a5a40;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-leaf{width:15px;height:15px;background:#dad7cd;border-radius:0 100% 0 100%;transform:rotate(-12deg);}
.logo-text{display:flex;flex-direction:column;line-height:1.1;}
.logo-name{font-family:'Newsreader',serif;font-size:21px;font-weight:500;color:#2a3a2e;}
.logo-sub{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#9aa792;font-weight:600;}
nav{display:flex;flex-direction:column;gap:3px;}
.nav-btn{position:relative;display:flex;align-items:center;gap:13px;width:100%;padding:11px 13px;border:none;background:transparent;border-radius:12px;text-align:left;color:#46553f;transition:background .15s;}
.nav-btn:hover{background:#f2f5ee;}
.nav-btn.active{background:#e9efe1;}
.nav-icon{position:relative;display:flex;width:22px;justify-content:center;color:#5d7257;}
.nav-label{position:relative;font-size:14.5px;font-weight:600;}
.sidebar-footer{margin-top:auto;padding:14px 13px 4px;border-top:1px solid #eef1ea;}
.footer-date{margin:0 0 3px;font-size:12.5px;color:#8a9783;font-weight:600;}
.footer-tasks{margin:0;font-size:13px;color:#3a5a40;font-weight:700;}

/* Main */
.main{flex:1;min-width:0;overflow-y:auto;background:#f4f6f1;}
.main-inner{max-width:1060px;margin:0 auto;padding:46px 52px 90px;}

/* Section cards */
.card{background:#fff;border:1px solid #e7ebe2;border-radius:18px;padding:26px;box-shadow:0 1px 2px rgba(40,60,40,.04),0 14px 30px -22px rgba(40,60,40,.18);}
.card-sm{background:#fff;border:1px solid #e7ebe2;border-radius:16px;}

/* Typography */
.section-eyebrow{font-size:12.5px;letter-spacing:.15em;text-transform:uppercase;color:#8a9783;margin:0 0 7px;font-weight:700;}
.section-title{font-family:'Newsreader',serif;font-weight:400;font-size:40px;margin:0 0 6px;color:#2a3a2e;}
.section-sub{font-size:15px;color:#8a9783;margin:0 0 28px;}
.card-label{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#7d8a78;font-weight:700;margin:0;}

/* Inputs */
.inp{padding:12px 15px;border:1px solid #dde3d6;border-radius:11px;font-size:14.5px;outline:none;color:#2a3a2e;background:#fafbf8;transition:border-color .15s,background .15s;}
.inp:focus{border-color:#a3b18a;background:#fff;}
.inp-lg{padding:13px 16px;border-radius:12px;font-size:15px;background:#fff;}
.inp-lg:focus{border-color:#a3b18a;}

/* Buttons */
.btn-primary{border:none;background:#3a5a40;color:#fff;border-radius:11px;font-size:14.5px;font-weight:600;padding:0 20px;transition:background .15s;}
.btn-primary:hover{background:#33503a;}
.btn-primary-lg{border-radius:12px;}
.btn-icon-add{flex:none;width:44px;height:44px;border:none;background:#3a5a40;color:#fff;border-radius:11px;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.btn-icon-add:hover{background:#33503a;}
.btn-remove{width:26px;height:26px;border:none;background:transparent;color:#bcc6b4;border-radius:7px;font-size:17px;line-height:1;transition:background .15s,color .15s;}
.btn-remove:hover{background:#f0ebe9;color:#b46a6a;}

/* View */
.view{animation:rise .2s ease;}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon"><span class="logo-leaf"></span></span>
      <span class="logo-text">
        <span class="logo-name">Sage</span>
        <span class="logo-sub">Planner</span>
      </span>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-footer">
      <p class="footer-date" id="footerDate"></p>
      <p class="footer-tasks" id="footerTasks"></p>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-inner" id="mainContent"></div>
  </main>
</div>

<!-- Confetti layer -->
<div id="confetti" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999;"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const KEY = 'sage_planner_v1';
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const QUOTES = [
  "Small steps, taken daily, become the path.",
  "Progress is quiet. Keep showing up.",
  "You don't have to do it all — just the next thing.",
  "A calm mind plans the clearest day.",
  "Done is kinder than perfect.",
  "Tend to today, and tomorrow follows.",
  "Your pace is the right pace.",
  "Begin where you are, with what you have.",
  "Rest is part of the work.",
  "What you water, grows.",
  "One good hour can change a whole day.",
  "Gentle and steady carries you far.",
  "Clarity comes from starting, not waiting.",
  "Make room for what matters most.",
  "Today is enough to focus on."
];

function uid(){ return Math.random().toString(36).slice(2,9); }

function defaultState(){
  const week={}, weekDraft={}, meals={};
  DAYS.forEach(d=>{ week[d]=[]; weekDraft[d]=''; meals[d]={b:'',l:'',d:''}; });
  return {
    view:'today', userName:'',
    tasks:[
      {id:uid(),text:'Morning walk',done:true,priority:false},
      {id:uid(),text:'Reply to emails',done:false,priority:true},
      {id:uid(),text:'Plan the week ahead',done:false,priority:false}
    ],
    taskDraft:'',
    week, weekDraft,
    goals:[
      {id:uid(),text:'Read 2 books',progress:40},
      {id:uid(),text:'Walk 10k steps daily',progress:65}
    ],
    goalDraft:'',
    budget:{income:3200,expenses:[
      {id:uid(),label:'Rent',amount:1200},
      {id:uid(),label:'Groceries',amount:280}
    ]},
    expLabel:'', expAmount:'',
    meals,
    shopping:[
      {id:uid(),text:'Spinach',done:false},
      {id:uid(),text:'Olive oil',done:false},
      {id:uid(),text:'Oats',done:true}
    ],
    shopDraft:'',
    selfcare:[
      {id:uid(),label:'Drink water',done:false,streak:3},
      {id:uid(),label:'10 min stretch',done:false,streak:5},
      {id:uid(),label:'Read before bed',done:false,streak:2}
    ],
    scDraft:'',
    notes:[
      {id:uid(),title:'Ideas',body:'Start a small herb garden on the balcony — basil, mint, thyme.',date:'Jun 12'}
    ],
    noteTitleDraft:'', noteBodyDraft:''
  };
}

let state;
try { const s=localStorage.getItem(KEY); const p=JSON.parse(s); state = (p&&p.week&&p.meals)?p:defaultState(); }
catch(e){ state=defaultState(); }

let prevAllDone = allDone();

function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }

function setState(patch){
  Object.assign(state, patch);
  save();
  maybeCelebrate();
  render();
}

function allDone(){ return state.tasks.length>0 && state.tasks.every(t=>t.done); }

function maybeCelebrate(){
  const now = allDone();
  if(now && !prevAllDone) spawnConfetti();
  prevAllDone = now;
}

function spawnConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#3a5a40','#588157','#a3b18a','#dad7cd','#94a187'];
  for(let i=0;i<64;i++){
    const p=document.createElement('div');
    const size=6+Math.random()*8;
    p.style.cssText='position:absolute;top:-14px;left:'+(Math.random()*100)+'%;width:'+size+'px;height:'+(size*0.55)+'px;background:'+colors[i%colors.length]+';border-radius:2px;opacity:0;animation:confetti-fall '+(1.7+Math.random()*1.5)+'s cubic-bezier(.25,.7,.35,1) '+(Math.random()*0.5)+'s forwards;';
    c.appendChild(p);
    setTimeout(()=>{ if(p.parentNode) p.parentNode.removeChild(p); },3600);
  }
}

function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function onEnter(fn){ return e=>{ if(e.key==='Enter'){ e.preventDefault(); fn(); } }; }

// ── Nav ─────────────────────────────────────────────────────────────────────
const VIEWS = [
  {key:'today', label:'Today', icon:'<circle cx="12" cy="12" r="9"></circle><path d="m8.4 12 2.6 2.6 4.6-5.2"></path>'},
  {key:'week',  label:'Week',  icon:'<rect x="3.5" y="4.5" width="17" height="16" rx="2.5"></rect><path d="M3.5 9h17M8 3v3M16 3v3"></path>'},
  {key:'goals', label:'Goals', icon:'<circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="5"></circle><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"></circle>'},
  {key:'budget',label:'Budget',icon:'<rect x="3" y="6" width="18" height="13" rx="2.5"></rect><path d="M3 10h18"></path><circle cx="16.5" cy="14" r="1.1" fill="currentColor" stroke="none"></circle>'},
  {key:'meals', label:'Meals', icon:'<path d="M4 11h16a8 8 0 0 1-16 0z"></path><path d="M9.2 5.2c-.6-1-.4-1.8.2-2.7M13 5.2c-.6-1-.4-1.8.2-2.7"></path>'},
  {key:'shopping',label:'Shopping',icon:'<path d="M5 8h14l-1.1 11.5a1 1 0 0 1-1 .9H7.1a1 1 0 0 1-1-.9L5 8z"></path><path d="M8.5 8V6.2a3.5 3.5 0 0 1 7 0V8"></path>'},
  {key:'selfcare',label:'Self-care',icon:'<path d="M12 20s-6.6-4.3-9-8C1.4 9.4 2.6 6 5.9 6c1.8 0 3 1.1 3.7 2.1C10.3 7.1 11.5 6 13.3 6c3.3 0 4.5 3.4 2.9 6-2.4 3.7-9.2 8-4.2 8z"></path>'},
  {key:'notes', label:'Notes', icon:'<rect x="5.5" y="3.5" width="14" height="17" rx="2"></rect><path d="M9 8.5h6M9 12h6M9 15.5h4M5.5 7H4M5.5 12H4M5.5 17H4"></path>'}
];

function renderNav(){
  document.getElementById('nav').innerHTML = VIEWS.map(v=>`
    <button class="nav-btn${state.view===v.key?' active':''}" onclick="goView('${v.key}')">
      <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${v.icon}</svg></span>
      <span class="nav-label">${v.label}</span>
    </button>`).join('');
}

function goView(v){ setState({view:v}); }

// ── Today ───────────────────────────────────────────────────────────────────
function renderToday(){
  const now = new Date();
  const hr = now.getHours();
  const greeting = hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dayIdx = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const quote = QUOTES[dayIdx % QUOTES.length];
  const total = state.tasks.length;
  const done = state.tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const ringCirc = 2*Math.PI*60;
  const ringOffset = ringCirc*(1-(total?done/total:0));
  const priorities = state.tasks.filter(t=>t.priority&&!t.done);

  return `
  <div class="view">
    <p class="section-eyebrow">${dateStr}</p>
    <h1 style="font-family:'Newsreader',serif;font-weight:400;font-size:46px;margin:0 0 26px;line-height:1.08;color:#2a3a2e;">
      ${greeting}, <input id="nameInput" value="${esc(state.userName)}" placeholder="friend"
        style="font-family:'Newsreader',serif;font-size:46px;font-weight:400;color:#3a5a40;border:none;outline:none;background:transparent;width:13ch;padding:0;"
        oninput="setState({userName:this.value})">
    </h1>

    <div style="background:#eef2e8;border-radius:18px;padding:24px 28px;margin-bottom:24px;display:flex;gap:18px;align-items:flex-start;">
      <span style="font-family:'Newsreader',serif;font-size:46px;line-height:.7;color:#a3b18a;flex:none;">"</span>
      <p style="font-family:'Newsreader',serif;font-style:italic;font-size:23px;line-height:1.4;color:#3f5343;margin:0;padding-top:4px;">${esc(quote)}</p>
    </div>

    <div style="display:grid;grid-template-columns:1.55fr 1fr;gap:24px;align-items:start;">
      <!-- Tasks -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
          <h2 class="card-label">Today's tasks</h2>
          <span style="font-size:13px;color:#9aa792;font-weight:600;">${done} / ${total}</span>
        </div>
        <div style="display:flex;gap:9px;margin-bottom:18px;">
          <input id="taskInp" class="inp" value="${esc(state.taskDraft)}" placeholder="Add a task and press Enter"
            style="flex:1;min-width:0;" oninput="state.taskDraft=this.value" onkeydown="if(event.key==='Enter'){addTask();}">
          <button class="btn-icon-add" onclick="addTask()">+</button>
        </div>
        ${allDone()?`<div style="display:flex;gap:14px;align-items:center;background:#e9efe1;border-radius:14px;padding:16px 18px;margin-bottom:14px;">
          <span style="width:38px;height:38px;flex:none;background:#3a5a40;border-radius:50%;display:flex;align-items:center;justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"></path></svg></span>
          <div><p style="margin:0;font-weight:700;font-size:15px;color:#2f4a35;">All done for today</p><p style="margin:2px 0 0;font-size:13.5px;color:#5f7160;">You cleared your list. Enjoy the rest of your day.</p></div>
        </div>`:''}
        <div style="display:flex;flex-direction:column;gap:2px;">
          ${state.tasks.map(t=>`
          <div style="display:flex;align-items:center;gap:13px;padding:11px 6px;border-bottom:1px solid #f0f2ec;">
            <button onclick="toggleTask('${t.id}')" style="flex:none;width:23px;height:23px;border-radius:7px;border:2px solid ${t.done?'#3a5a40':'#c2cdb9'};background:${t.done?'#3a5a40':'#fff'};display:flex;align-items:center;justify-content:center;padding:0;transition:all .2s;">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:${t.done?1:0};transition:opacity .2s;"><path d="m5 12.5 4.5 4.5L19 7"></path></svg>
            </button>
            <span style="flex:1;font-size:15px;font-weight:500;color:${t.done?'#aab5a3':'#2a3a2e'};text-decoration:${t.done?'line-through':'none'};transition:color .2s;">${esc(t.text)}</span>
            <button onclick="prioTask('${t.id}')" title="Mark as priority" style="flex:none;width:26px;height:26px;border:none;background:transparent;border-radius:7px;display:flex;align-items:center;justify-content:center;color:${t.priority?'#3a5a40':'#cdd6c4'};">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4M5 4h11l-2 3.5L16 11H5"></path></svg>
            </button>
            <button class="btn-remove" onclick="removeTask('${t.id}')">×</button>
          </div>`).join('')}
        </div>
        ${total===0?`<p style="text-align:center;color:#a7b2a0;font-size:14px;padding:22px 0 8px;margin:0;">No tasks yet — add your first one above.</p>`:''}
      </div>

      <div style="display:flex;flex-direction:column;gap:24px;">
        <!-- Progress ring -->
        <div class="card" style="text-align:center;">
          <h2 class="card-label" style="margin-bottom:18px;">Progress</h2>
          <div style="position:relative;width:148px;height:148px;margin:0 auto;">
            <svg width="148" height="148" viewBox="0 0 148 148">
              <circle cx="74" cy="74" r="60" fill="none" stroke="#edf0e9" stroke-width="13"></circle>
              <circle cx="74" cy="74" r="60" fill="none" stroke="#3a5a40" stroke-width="13" stroke-linecap="round"
                stroke-dasharray="${ringCirc}" stroke-dashoffset="${ringOffset}"
                transform="rotate(-90 74 74)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"></circle>
            </svg>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
              <span style="font-size:34px;font-weight:800;color:#3a5a40;line-height:1;">${pct}%</span>
              <span style="font-size:12.5px;color:#9aa792;font-weight:600;margin-top:3px;">${done} of ${total}</span>
            </div>
          </div>
        </div>
        <!-- Focus -->
        <div class="card">
          <h2 class="card-label" style="margin-bottom:15px;">Today's focus</h2>
          ${priorities.map(t=>`
          <div style="display:flex;align-items:center;gap:11px;padding:8px 0;">
            <span style="width:7px;height:7px;flex:none;background:#3a5a40;border-radius:50%;"></span>
            <span style="font-size:14.5px;color:#3f5343;font-weight:500;">${esc(t.text)}</span>
          </div>`).join('')}
          ${priorities.length===0?`<p style="margin:0;font-size:13.5px;color:#a7b2a0;line-height:1.5;">Flag a task with the <span style="color:#5d7257;">flag</span> icon to keep it front of mind.</p>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function addTask(){
  const t=state.taskDraft.trim();
  if(!t) return;
  setState({tasks:[...state.tasks,{id:uid(),text:t,done:false,priority:false}],taskDraft:''});
}
function toggleTask(id){ setState({tasks:state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t)}); }
function removeTask(id){ setState({tasks:state.tasks.filter(t=>t.id!==id)}); }
function prioTask(id){ setState({tasks:state.tasks.map(t=>t.id===id?{...t,priority:!t.priority}:t)}); }

// ── Week ─────────────────────────────────────────────────────────────────────
function renderWeek(){
  const now=new Date(); const jsDay=now.getDay(); const todayKey=DAYS[(jsDay+6)%7];
  return `
  <div class="view">
    <h1 class="section-title">This week</h1>
    <p class="section-sub">Plan what each day holds.</p>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:12px;">
      ${DAYS.map(d=>{
        const isT=d===todayKey;
        return `<div style="background:#fff;border:1px solid ${isT?'#cdd9c2':'#e7ebe2'};border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:${isT?'0 10px 26px -20px rgba(58,90,64,.5)':'0 1px 2px rgba(40,60,40,.03)'};">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:${isT?'#3a5a40':'#f3f6ef'};color:${isT?'#fff':'#46553f'};">
            <span style="font-size:13px;font-weight:700;">${d}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:7px;padding:12px 10px;min-height:120px;">
            ${(state.week[d]||[]).map(ev=>`
            <div style="position:relative;background:#eef2e8;border-radius:9px;padding:8px 24px 8px 10px;font-size:12.5px;color:#3f5343;font-weight:500;line-height:1.3;">
              ${esc(ev.text)}
              <button onclick="removeWeekEvent('${d}','${ev.id}')" style="position:absolute;top:4px;right:5px;width:18px;height:18px;border:none;background:transparent;color:#a7b2a0;border-radius:5px;font-size:14px;line-height:1;">×</button>
            </div>`).join('')}
            <input value="${esc((state.weekDraft||{})[d]||'')}" placeholder="+ add"
              style="width:100%;padding:7px 8px;border:1px dashed #d3dccb;border-radius:8px;font-size:12.5px;outline:none;background:transparent;color:#2a3a2e;margin-top:auto;"
              oninput="state.weekDraft['${d}']=this.value"
              onkeydown="if(event.key==='Enter'){addWeekEvent('${d}',this);}">
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function addWeekEvent(day, inp){
  const v=(state.weekDraft[day]||'').trim(); if(!v) return;
  state.weekDraft[day]='';
  setState({week:{...state.week,[day]:[...state.week[day],{id:uid(),text:v}]}});
}
function removeWeekEvent(day,id){ setState({week:{...state.week,[day]:state.week[day].filter(x=>x.id!==id)}}); }

// ── Goals ────────────────────────────────────────────────────────────────────
function renderGoals(){
  const now=new Date(); const monthLabel=now.toLocaleDateString('en-US',{month:'long'})+' goals';
  return `
  <div class="view" style="max-width:720px;">
    <h1 class="section-title">${monthLabel}</h1>
    <p class="section-sub">Track the bigger things, a little at a time.</p>
    <div style="display:flex;gap:9px;margin-bottom:24px;">
      <input id="goalInp" class="inp inp-lg" value="${esc(state.goalDraft)}" placeholder="Add a goal for this month"
        style="flex:1;min-width:0;" oninput="state.goalDraft=this.value" onkeydown="if(event.key==='Enter'){addGoal();}">
      <button class="btn-primary btn-primary-lg" style="flex:none;padding:0 22px;" onclick="addGoal()">Add</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      ${state.goals.map(g=>`
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px;">
          <span style="font-size:16px;font-weight:600;color:#2a3a2e;">${esc(g.text)}</span>
          <div style="display:flex;align-items:center;gap:10px;flex:none;">
            <span style="font-size:15px;font-weight:700;color:#3a5a40;width:44px;text-align:right;">${g.progress}%</span>
            <button onclick="bumpGoal('${g.id}',-10)" style="width:30px;height:30px;border:1px solid #dde3d6;background:#fff;color:#5d7257;border-radius:9px;font-size:18px;line-height:1;">−</button>
            <button onclick="bumpGoal('${g.id}',10)" style="width:30px;height:30px;border:1px solid #dde3d6;background:#fff;color:#5d7257;border-radius:9px;font-size:18px;line-height:1;">+</button>
            <button class="btn-remove" onclick="removeGoal('${g.id}')">×</button>
          </div>
        </div>
        <div style="height:9px;background:#edf0e9;border-radius:6px;overflow:hidden;">
          <div style="height:100%;width:${g.progress}%;background:#3a5a40;border-radius:6px;transition:width .4s cubic-bezier(.4,0,.2,1);"></div>
        </div>
      </div>`).join('')}
    </div>
    ${state.goals.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14.5px;padding:30px 0;margin:0;">No goals yet — add one above to start tracking.</p>`:''}
  </div>`;
}

function addGoal(){ const t=state.goalDraft.trim(); if(!t) return; setState({goals:[...state.goals,{id:uid(),text:t,progress:0}],goalDraft:''}); }
function bumpGoal(id,d){ setState({goals:state.goals.map(g=>g.id===id?{...g,progress:Math.max(0,Math.min(100,g.progress+d))}:g)}); }
function removeGoal(id){ setState({goals:state.goals.filter(g=>g.id!==id)}); }

// ── Budget ───────────────────────────────────────────────────────────────────
function renderBudget(){
  const totalExp=state.budget.expenses.reduce((a,e)=>a+e.amount,0);
  const remaining=state.budget.income-totalExp;
  const spentPct=state.budget.income>0?Math.min(100,totalExp/state.budget.income*100):0;
  const neg=remaining<0;
  return `
  <div class="view" style="max-width:760px;">
    <h1 class="section-title">Budget</h1>
    <p class="section-sub">A simple view of money in and money out.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:26px;">
      <div class="card-sm" style="padding:20px 22px;">
        <p style="font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:#9aa792;font-weight:700;margin:0 0 8px;">Income</p>
        <div style="display:flex;align-items:baseline;gap:2px;">
          <span style="font-size:22px;font-weight:700;color:#3a5a40;">$</span>
          <input type="number" value="${state.budget.income}" style="width:100%;border:none;outline:none;font-size:26px;font-weight:800;color:#2a3a2e;background:transparent;padding:0;font-family:inherit;"
            oninput="setIncome(this.value)">
        </div>
      </div>
      <div class="card-sm" style="padding:20px 22px;">
        <p style="font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:#9aa792;font-weight:700;margin:0 0 8px;">Spent</p>
        <p style="font-size:28px;font-weight:800;color:#2a3a2e;margin:0;">${fmt(totalExp)}</p>
      </div>
      <div class="card-sm" style="padding:20px 22px;background:${neg?'#fbeeee':'#eef2e8'};border-color:${neg?'#e6cccc':'#cdd9c2'};">
        <p style="font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:#9aa792;font-weight:700;margin:0 0 8px;">Remaining</p>
        <p style="font-size:28px;font-weight:800;color:${neg?'#b23a48':'#3a5a40'};margin:0;">${fmt(remaining)}</p>
      </div>
    </div>
    <div style="height:11px;background:#edf0e9;border-radius:7px;overflow:hidden;margin-bottom:30px;">
      <div style="height:100%;width:${spentPct}%;background:${neg?'#b23a48':'#3a5a40'};border-radius:7px;transition:width .4s;"></div>
    </div>
    <h2 class="card-label" style="margin-bottom:14px;">Expenses</h2>
    <div style="display:flex;gap:9px;margin-bottom:18px;">
      <input id="expLabel" class="inp" value="${esc(state.expLabel)}" placeholder="What for?" style="flex:1;min-width:0;"
        oninput="state.expLabel=this.value" onkeydown="if(event.key==='Enter'){addExpense();}">
      <input id="expAmount" class="inp" type="number" value="${esc(state.expAmount)}" placeholder="$0" style="width:120px;flex:none;"
        oninput="state.expAmount=this.value" onkeydown="if(event.key==='Enter'){addExpense();}">
      <button class="btn-primary" onclick="addExpense()">Add</button>
    </div>
    <div class="card-sm">
      ${state.budget.expenses.map(e=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f0f2ec;">
        <span style="font-size:14.5px;color:#2a3a2e;font-weight:500;">${esc(e.label)}</span>
        <div style="display:flex;align-items:center;gap:14px;">
          <span style="font-size:14.5px;font-weight:700;color:#3f5343;">${fmt(e.amount)}</span>
          <button class="btn-remove" onclick="removeExpense('${e.id}')">×</button>
        </div>
      </div>`).join('')}
      ${state.budget.expenses.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14px;padding:22px;margin:0;">No expenses logged yet.</p>`:''}
    </div>
  </div>`;
}

function setIncome(v){ const n=parseFloat(v); setState({budget:{...state.budget,income:isNaN(n)?0:n}}); }
function addExpense(){
  const l=state.expLabel.trim(); const a=parseFloat(state.expAmount);
  if(!l||isNaN(a)) return;
  setState({budget:{...state.budget,expenses:[...state.budget.expenses,{id:uid(),label:l,amount:a}]},expLabel:'',expAmount:''});
}
function removeExpense(id){ setState({budget:{...state.budget,expenses:state.budget.expenses.filter(x=>x.id!==id)}}); }

// ── Meals ─────────────────────────────────────────────────────────────────────
function renderMeals(){
  const now=new Date(); const jsDay=now.getDay(); const todayKey=DAYS[(jsDay+6)%7];
  return `
  <div class="view">
    <h1 class="section-title">Meal plan</h1>
    <p class="section-sub">A relaxed week of breakfast, lunch and dinner.</p>
    <div class="card-sm" style="overflow:hidden;box-shadow:0 1px 2px rgba(40,60,40,.04),0 14px 30px -24px rgba(40,60,40,.16);">
      <div style="display:grid;grid-template-columns:88px 1fr 1fr 1fr;background:#f3f6ef;border-bottom:1px solid #e7ebe2;">
        <span style="padding:14px 16px;"></span>
        <span style="padding:14px 16px;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8a78;font-weight:700;">Breakfast</span>
        <span style="padding:14px 16px;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8a78;font-weight:700;">Lunch</span>
        <span style="padding:14px 16px;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8a78;font-weight:700;">Dinner</span>
      </div>
      ${DAYS.map(d=>{
        const isT=d===todayKey;
        const m=state.meals[d];
        return `<div style="display:grid;grid-template-columns:88px 1fr 1fr 1fr;border-bottom:1px solid #f0f2ec;background:${isT?'#f7faf3':'#fff'};">
          <span style="padding:14px 16px;font-size:14px;font-weight:700;color:${isT?'#3a5a40':'#46553f'};display:flex;align-items:center;">${d}</span>
          ${['b','l','d'].map(slot=>`
          <input value="${esc(m[slot])}" placeholder="—"
            style="border:none;border-left:1px solid #f0f2ec;padding:14px 16px;font-size:14px;outline:none;background:transparent;color:#2a3a2e;font-family:inherit;"
            oninput="setMeal('${d}','${slot}',this.value)">`).join('')}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function setMeal(day,slot,val){ state.meals[day][slot]=val; save(); }

// ── Shopping ──────────────────────────────────────────────────────────────────
function renderShopping(){
  const shopRemaining=state.shopping.filter(x=>!x.done).length;
  const hasChecked=state.shopping.some(x=>x.done);
  const label=shopRemaining===0?'All gathered':(shopRemaining+' item'+(shopRemaining===1?'':'s')+' to get');
  return `
  <div class="view" style="max-width:620px;">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;">
      <div>
        <h1 class="section-title">Shopping list</h1>
        <p class="section-sub" style="margin:0;">${label}</p>
      </div>
      ${hasChecked?`<button onclick="clearChecked()" style="flex:none;padding:9px 15px;border:1px solid #dde3d6;background:#fff;color:#5d7257;border-radius:10px;font-size:13px;font-weight:600;">Clear checked</button>`:''}
    </div>
    <div style="display:flex;gap:9px;margin-bottom:20px;">
      <input id="shopInp" class="inp inp-lg" value="${esc(state.shopDraft)}" placeholder="Add an item and press Enter"
        style="flex:1;min-width:0;" oninput="state.shopDraft=this.value" onkeydown="if(event.key==='Enter'){addShop();}">
      <button class="btn-icon-add" style="border-radius:12px;width:48px;" onclick="addShop()">+</button>
    </div>
    <div class="card-sm">
      ${state.shopping.map(it=>`
      <div style="display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid #f0f2ec;">
        <button onclick="toggleShop('${it.id}')" style="flex:none;width:23px;height:23px;border-radius:7px;border:2px solid ${it.done?'#3a5a40':'#c2cdb9'};background:${it.done?'#3a5a40':'#fff'};display:flex;align-items:center;justify-content:center;padding:0;transition:all .2s;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:${it.done?1:0};"><path d="m5 12.5 4.5 4.5L19 7"></path></svg>
        </button>
        <span style="flex:1;font-size:15px;font-weight:500;color:${it.done?'#aab5a3':'#2a3a2e'};text-decoration:${it.done?'line-through':'none'};">${esc(it.text)}</span>
        <button class="btn-remove" onclick="removeShop('${it.id}')">×</button>
      </div>`).join('')}
      ${state.shopping.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14px;padding:24px;margin:0;">Your list is empty.</p>`:''}
    </div>
  </div>`;
}

function addShop(){ const t=state.shopDraft.trim(); if(!t) return; setState({shopping:[...state.shopping,{id:uid(),text:t,done:false}],shopDraft:''}); }
function toggleShop(id){ setState({shopping:state.shopping.map(s=>s.id===id?{...s,done:!s.done}:s)}); }
function removeShop(id){ setState({shopping:state.shopping.filter(s=>s.id!==id)}); }
function clearChecked(){ setState({shopping:state.shopping.filter(s=>!s.done)}); }

// ── Self-care ─────────────────────────────────────────────────────────────────
function renderSelfcare(){
  return `
  <div class="view" style="max-width:720px;">
    <h1 class="section-title">Self-care</h1>
    <p class="section-sub">Gentle habits, kept up day by day.</p>
    <div style="display:flex;gap:9px;margin-bottom:24px;">
      <input id="scInp" class="inp inp-lg" value="${esc(state.scDraft)}" placeholder="Add a habit to nurture"
        style="flex:1;min-width:0;" oninput="state.scDraft=this.value" onkeydown="if(event.key==='Enter'){addSelfcare();}">
      <button class="btn-primary btn-primary-lg" style="flex:none;padding:0 22px;" onclick="addSelfcare()">Add</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      ${state.selfcare.map(h=>`
      <div style="background:${h.done?'#eef2e8':'#fff'};border:1px solid ${h.done?'#cdd9c2':'#e7ebe2'};border-radius:15px;padding:18px 20px;display:flex;flex-direction:column;gap:14px;transition:all .2s;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
          <div>
            <p style="font-size:16px;font-weight:600;color:#2a3a2e;margin:0 0 6px;">${esc(h.label)}</p>
            <p style="font-size:13px;color:#7d8a78;font-weight:600;margin:0;">${h.streak>0?(h.streak+' day streak'):'Start your streak'}</p>
          </div>
          <button class="btn-remove" onclick="removeSelfcare('${h.id}')">×</button>
        </div>
        <button onclick="toggleSelfcare('${h.id}')" style="width:100%;padding:10px;border-radius:10px;border:1px solid ${h.done?'#3a5a40':'#dde3d6'};background:${h.done?'#3a5a40':'#fff'};color:${h.done?'#fff':'#5d7257'};font-weight:600;font-size:14px;font-family:inherit;transition:all .2s;">${h.done?'Done today':'Mark done'}</button>
      </div>`).join('')}
    </div>
    ${state.selfcare.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14.5px;padding:30px 0;margin:0;">Add a habit above to start a streak.</p>`:''}
  </div>`;
}

function addSelfcare(){ const t=state.scDraft.trim(); if(!t) return; setState({selfcare:[...state.selfcare,{id:uid(),label:t,done:false,streak:0}],scDraft:''}); }
function toggleSelfcare(id){ setState({selfcare:state.selfcare.map(h=>h.id===id?{...h,done:!h.done,streak:Math.max(0,h.streak+(h.done?-1:1))}:h)}); }
function removeSelfcare(id){ setState({selfcare:state.selfcare.filter(h=>h.id!==id)}); }

// ── Notes ─────────────────────────────────────────────────────────────────────
function renderNotes(){
  return `
  <div class="view">
    <h1 class="section-title">Notes</h1>
    <p class="section-sub">Jot down thoughts, ideas and reminders.</p>
    <div class="card" style="margin-bottom:26px;max-width:640px;">
      <input id="noteTitleInp" value="${esc(state.noteTitleDraft)}" placeholder="Note title"
        style="width:100%;border:none;outline:none;font-size:17px;font-weight:700;color:#2a3a2e;background:transparent;margin-bottom:8px;font-family:'Newsreader',serif;"
        oninput="state.noteTitleDraft=this.value">
      <textarea id="noteBodyInp" placeholder="Write something..." rows="2"
        style="width:100%;border:none;outline:none;font-size:14.5px;color:#3f5343;background:transparent;resize:none;font-family:inherit;line-height:1.5;"
        oninput="state.noteBodyDraft=this.value">${esc(state.noteBodyDraft)}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn-primary" style="padding:9px 20px;" onclick="addNote()">Save note</button>
      </div>
    </div>
    <div style="columns:3;column-gap:16px;">
      ${state.notes.map(n=>`
      <div style="break-inside:avoid;background:#fff;border:1px solid #e7ebe2;border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(40,60,40,.04);">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;">
          <p style="font-family:'Newsreader',serif;font-size:18px;font-weight:600;color:#2a3a2e;margin:0;line-height:1.2;">${esc(n.title)}</p>
          <button class="btn-remove" onclick="removeNote('${n.id}')">×</button>
        </div>
        <p style="font-size:14px;color:#4f6152;line-height:1.55;margin:0 0 12px;white-space:pre-wrap;">${esc(n.body)}</p>
        <p style="font-size:12px;color:#a7b2a0;font-weight:600;margin:0;">${n.date}</p>
      </div>`).join('')}
    </div>
    ${state.notes.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14.5px;padding:20px 0;margin:0;">No notes yet — your first one will appear here.</p>`:''}
  </div>`;
}

function addNote(){
  const t=state.noteTitleDraft.trim(); const b=state.noteBodyDraft.trim();
  if(!t&&!b) return;
  const d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  setState({notes:[{id:uid(),title:t||'Untitled',body:b,date:d},...state.notes],noteTitleDraft:'',noteBodyDraft:''});
}
function removeNote(id){ setState({notes:state.notes.filter(n=>n.id!==id)}); }

// ── Escape ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  renderNav();
  // Footer
  const now=new Date();
  document.getElementById('footerDate').textContent = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const total=state.tasks.length, done=state.tasks.filter(t=>t.done).length;
  document.getElementById('footerTasks').textContent = done+' of '+total+' tasks done';
  // Content
  const views = {today:renderToday,week:renderWeek,goals:renderGoals,budget:renderBudget,meals:renderMeals,shopping:renderShopping,selfcare:renderSelfcare,notes:renderNotes};
  document.getElementById('mainContent').innerHTML = (views[state.view]||renderToday)();
}

render();
</script>
</body>
</html>

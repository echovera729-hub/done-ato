<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sage — Personal Planner</title>
<meta name="application-name" content="Sage">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sage">
<meta name="theme-color" id="themeColorMeta" content="#3a5a40">
<link rel="manifest" id="pwaManifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f1;--surface:#fff;--border:#e7ebe2;--border2:#f0f2ec;--accent:#3a5a40;--accent2:#33503a;--accentBg:#eef2e8;--accentBg2:#e9efe1;--accentMid:#a3b18a;--accentBar:#cdd9c2;--text:#2a3a2e;--text2:#46553f;--text3:#3f5343;--muted:#8a9783;--muted2:#9aa792;--muted3:#7d8a78;--placeholder:#a7b2a0;--inpBg:#fafbf8;--inpFocus:#fff;--navHover:#f2f5ee;--navActive:#e9efe1;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(40,60,40,.04),0 14px 30px -22px rgba(40,60,40,.18);--btnRemoveHover:#f0ebe9;--btnRemoveHoverText:#b46a6a;--leaf:#dad7cd;--scrollThumb:#cfd8c8;--scrollThumbHover:#b9c4ad;--quote-bg:#eef2e8;--today-highlight:#f0f5ec;--weekend-color:#9aa792;--done-fill:#3a5a40;--done-text:#aab5a3;--neg-bg:#fbeeee;--neg-border:#e6cccc;--neg-text:#b23a48;--ring-track:#edf0e9;--bnav-active-border:#3a5a40;}
[data-theme="lavender"]{--bg:#f5f3f9;--surface:#fff;--border:#e6e1f0;--border2:#ede9f5;--accent:#6b5b9a;--accent2:#5c4d85;--accentBg:#eeebf7;--accentBg2:#e6e1f0;--accentMid:#b8a9d9;--accentBar:#c9bed9;--text:#2e2542;--text2:#4a3d6b;--text3:#4a3d6b;--muted:#9188a8;--muted2:#a498bd;--muted3:#8878a4;--placeholder:#b0a8c8;--inpBg:#faf9fd;--navHover:#f0ecf9;--navActive:#e8e2f5;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(60,40,100,.04),0 14px 30px -22px rgba(60,40,100,.14);--leaf:#c9bed9;--scrollThumb:#c9bed9;--scrollThumbHover:#b0a4cc;--quote-bg:#eeebf7;--today-highlight:#f0ecf9;--weekend-color:#a498bd;--done-fill:#6b5b9a;--done-text:#b0a8c8;--ring-track:#ede9f5;--bnav-active-border:#6b5b9a;}
[data-theme="rose"]{--bg:#fdf5f5;--surface:#fff;--border:#f0e0e0;--border2:#f7eded;--accent:#a05070;--accent2:#8c4060;--accentBg:#fceef3;--accentBg2:#f7e3ea;--accentMid:#d4a0b5;--accentBar:#e0b8c8;--text:#3d1f2a;--text2:#6b3045;--text3:#6b3045;--muted:#b08090;--muted2:#c09aaa;--muted3:#a07080;--placeholder:#c8aab5;--inpBg:#fdf9fa;--navHover:#faeef2;--navActive:#f5e4ea;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(100,40,60,.04),0 14px 30px -22px rgba(100,40,60,.14);--leaf:#e0b8c8;--scrollThumb:#e0c0cc;--scrollThumbHover:#c8a0b0;--quote-bg:#fceef3;--today-highlight:#faeef2;--weekend-color:#c09aaa;--done-fill:#a05070;--done-text:#c8aab5;--ring-track:#f7eded;--bnav-active-border:#a05070;}
[data-theme="sky"]{--bg:#f2f7fc;--surface:#fff;--border:#d8eaf5;--border2:#eaf3fa;--accent:#3a7abf;--accent2:#2f68a8;--accentBg:#e8f2fb;--accentBg2:#d8eaf5;--accentMid:#90bcdf;--accentBar:#a8ccec;--text:#1a3050;--text2:#2a5070;--text3:#2a5070;--muted:#6898b8;--muted2:#7aaac8;--muted3:#5888a8;--placeholder:#9abbcf;--inpBg:#f8fbfd;--navHover:#eaf3fb;--navActive:#d8eaf5;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(30,80,140,.04),0 14px 30px -22px rgba(30,80,140,.14);--leaf:#a8ccec;--scrollThumb:#a8ccec;--scrollThumbHover:#88b4d8;--quote-bg:#e8f2fb;--today-highlight:#eaf3fb;--weekend-color:#7aaac8;--done-fill:#3a7abf;--done-text:#9abbcf;--ring-track:#d8eaf5;--bnav-active-border:#3a7abf;}
[data-theme="peach"]{--bg:#fdf6f0;--surface:#fff;--border:#f0ddd0;--border2:#f8ede5;--accent:#b86040;--accent2:#a05030;--accentBg:#fceee6;--accentBg2:#f5e0d0;--accentMid:#e0a888;--accentBar:#e8c0a0;--text:#3c2010;--text2:#6a3820;--text3:#6a3820;--muted:#b08070;--muted2:#c09880;--muted3:#a07060;--placeholder:#c8a898;--inpBg:#fdf9f6;--navHover:#faeee8;--navActive:#f5e2d8;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(100,50,20,.04),0 14px 30px -22px rgba(100,50,20,.14);--leaf:#e8c0a0;--scrollThumb:#e0c0a8;--scrollThumbHover:#c8a088;--quote-bg:#fceee6;--today-highlight:#faeee8;--weekend-color:#c09880;--done-fill:#b86040;--done-text:#c8a898;--ring-track:#f0ddd0;--bnav-active-border:#b86040;}
[data-theme="mint"]{--bg:#f0f8f5;--surface:#fff;--border:#c8e8dc;--border2:#ddf0e8;--accent:#2e8b72;--accent2:#22755e;--accentBg:#e0f5ee;--accentBg2:#c8eade;--accentMid:#80c8b0;--accentBar:#a0d8c4;--text:#0f3028;--text2:#1e5040;--text3:#1e5040;--muted:#58988a;--muted2:#70aca0;--muted3:#489080;--placeholder:#88c0b0;--inpBg:#f5fbf8;--navHover:#e0f5ee;--navActive:#c8eade;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(20,80,60,.04),0 14px 30px -22px rgba(20,80,60,.14);--leaf:#a0d8c4;--scrollThumb:#a0d0c0;--scrollThumbHover:#80b8a8;--quote-bg:#e0f5ee;--today-highlight:#e0f5ee;--weekend-color:#70aca0;--done-fill:#2e8b72;--done-text:#88c0b0;--ring-track:#c8e8dc;--bnav-active-border:#2e8b72;}
[data-theme="honey"]{--bg:#fdf9ec;--surface:#fff;--border:#f3e7c4;--border2:#f8efd8;--accent:#c08a1e;--accent2:#a8761a;--accentBg:#fbf2dc;--accentBg2:#f6e8c4;--accentMid:#e6c878;--accentBar:#ecd9a0;--text:#4a3a10;--text2:#6b5420;--text3:#6b5420;--muted:#b89a5c;--muted2:#c8ad74;--muted3:#a8895a;--placeholder:#dccd9c;--inpBg:#fefcf5;--navHover:#faf2dc;--navActive:#f6e8c4;--sidebarBg:#fff;--topbarBg:#fff;--cardShadow:0 1px 2px rgba(140,100,10,.05),0 14px 30px -22px rgba(140,100,10,.16);--leaf:#ecd9a0;--scrollThumb:#ecd9a0;--scrollThumbHover:#dcc488;--quote-bg:#fbf2dc;--today-highlight:#faf2dc;--weekend-color:#c8ad74;--done-fill:#c08a1e;--done-text:#dccd9c;--neg-bg:#fbeeee;--neg-border:#e6cccc;--neg-text:#b23a48;--ring-track:#f6e8c4;--bnav-active-border:#c08a1e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Manrope',-apple-system,sans-serif;color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
input,button,textarea{font-family:inherit;}
input::placeholder,textarea::placeholder{color:var(--placeholder);}
button{cursor:pointer;}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollThumb);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollThumbHover)}
@keyframes confetti-fall{0%{transform:translateY(-12px) rotate(0);opacity:0}8%{opacity:1}100%{transform:translateY(620px) rotate(540deg);opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes themePop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes stickerPop{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0deg)}}
.app{display:flex;height:100vh;width:100%;overflow:hidden;}
.sidebar-wrap{position:relative;flex:none;}
.sidebar{width:252px;flex:none;background:var(--sidebarBg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:26px 18px 22px;transition:width .25s cubic-bezier(.4,0,.2,1),padding .25s,background .3s;overflow:hidden;height:100vh;}
.sidebar.collapsed{width:68px;padding:26px 14px 22px;}
.sidebar-toggle{position:absolute;top:50%;transform:translateY(-50%);right:-13px;width:26px;height:26px;background:var(--surface);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);z-index:20;box-shadow:0 1px 4px rgba(40,60,40,.1);transition:color .15s,box-shadow .15s;}
.sidebar-toggle:hover{color:var(--accent);box-shadow:0 2px 8px rgba(40,60,40,.18);}
.logo{display:flex;align-items:center;gap:11px;padding:0 8px 4px;margin-bottom:22px;white-space:nowrap;overflow:hidden;}
.logo-icon{width:38px;height:38px;flex:none;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;transition:background .3s;}
.logo-leaf{width:15px;height:15px;background:var(--leaf);border-radius:0 100% 0 100%;transform:rotate(-12deg);transition:background .3s;}
.logo-text{display:flex;flex-direction:column;line-height:1.1;transition:opacity .2s,width .25s;overflow:hidden;}
.sidebar.collapsed .logo-text{opacity:0;width:0;}
.logo-name{font-family:'Newsreader',serif;font-size:21px;font-weight:500;color:var(--text);}
.logo-sub{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted2);font-weight:600;}
nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.nav-btn{position:relative;display:flex;align-items:center;gap:13px;width:100%;padding:11px 13px;border:none;background:transparent;border-radius:12px;text-align:left;color:var(--text2);transition:background .15s;white-space:nowrap;overflow:hidden;}
.nav-btn:hover{background:var(--navHover);}
.nav-btn.active{background:var(--navActive);}
.nav-icon{position:relative;display:flex;width:22px;flex:none;justify-content:center;color:var(--accent);}
.nav-label{position:relative;font-size:14.5px;font-weight:600;transition:opacity .2s;}
.sidebar.collapsed .nav-label{opacity:0;width:0;overflow:hidden;}
.sidebar.collapsed .nav-btn{justify-content:center;gap:0;padding:11px 0;}
.sidebar-footer{margin-top:auto;padding:14px 13px 4px;border-top:1px solid var(--border);overflow:hidden;}
.footer-date{margin:0 0 3px;font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap;}
.footer-tasks{margin:0;font-size:13px;color:var(--accent);font-weight:700;white-space:nowrap;}
.sidebar.collapsed .sidebar-footer{opacity:0;pointer-events:none;}
.main{flex:1;min-width:0;overflow-y:auto;background:var(--bg);transition:background .3s;}
.main-inner{max-width:1060px;margin:0 auto;padding:46px 52px 90px;}
.mobile-topbar{display:none;}
.mobile-bottomnav{display:none;}
.drawer-overlay{display:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:var(--cardShadow);transition:background .3s,border-color .3s;}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:16px;transition:background .3s,border-color .3s;}
.section-eyebrow{font-size:12.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin:0 0 7px;font-weight:700;}
.section-title{font-family:'Newsreader',serif;font-weight:400;font-size:40px;margin:0 0 6px;color:var(--text);}
.section-sub{font-size:15px;color:var(--muted2);margin:0 0 28px;}
.card-label{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted3);font-weight:700;margin:0;}
.inp{padding:12px 15px;border:1px solid var(--border);border-radius:11px;font-size:14.5px;outline:none;color:var(--text);background:var(--inpBg);transition:border-color .15s,background .15s;}
.inp:focus{border-color:var(--accentMid);background:var(--inpFocus);}
.inp-lg{padding:13px 16px;border-radius:12px;font-size:15px;background:var(--surface);}
.btn-primary{border:none;background:var(--accent);color:#fff;border-radius:11px;font-size:14.5px;font-weight:600;padding:0 20px;transition:background .15s;}
.btn-primary:hover{background:var(--accent2);}
.btn-primary-lg{border-radius:12px;}
.btn-icon-add{flex:none;width:44px;height:44px;border:none;background:var(--accent);color:#fff;border-radius:11px;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.btn-icon-add:hover{background:var(--accent2);}
.btn-remove{width:26px;height:26px;border:none;background:transparent;color:var(--accentBar);border-radius:7px;font-size:17px;line-height:1;transition:background .15s,color .15s;}
.btn-remove:hover{background:var(--btnRemoveHover);color:var(--btnRemoveHoverText);}
.view{animation:rise .2s ease;}
.today-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:24px;align-items:start;}
.budget-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:26px;}
.selfcare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.notes-masonry{columns:3;column-gap:16px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
.month-header-row{display:grid;grid-template-columns:repeat(7,1fr);}
.month-week-row{display:grid;grid-template-columns:repeat(7,1fr);}
/* Theme picker */
.theme-picker-btn{margin-top:12px;width:100%;display:flex;align-items:center;gap:10px;padding:10px 13px;border:none;background:transparent;border-radius:12px;color:var(--text2);font-size:14px;font-weight:600;transition:background .15s;white-space:nowrap;overflow:hidden;}
.theme-picker-btn:hover{background:var(--navHover);}
.sidebar.collapsed .theme-picker-btn{justify-content:center;gap:0;padding:11px 0;}
.sidebar.collapsed .tp-label{opacity:0;width:0;overflow:hidden;}
.tp-label{font-size:14px;font-weight:600;transition:opacity .2s;}
.theme-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.theme-modal{background:var(--surface);border-radius:22px;padding:28px;width:340px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:themePop .25s ease;}
.theme-modal h2{font-family:'Newsreader',serif;font-size:24px;font-weight:400;color:var(--text);margin:0 0 6px;}
.theme-modal p{font-size:13.5px;color:var(--muted);margin:0 0 22px;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.theme-card{border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .2s,transform .15s;background:transparent;}
.theme-card:hover{transform:scale(1.03);}
.theme-card.selected{border-color:var(--accent);}
.theme-swatch{display:flex;gap:5px;margin-bottom:8px;}
.theme-swatch span{width:18px;height:18px;border-radius:50%;}
.theme-name{font-size:13px;font-weight:700;color:var(--text);}
.theme-desc{font-size:11.5px;color:var(--muted);margin-top:2px;}
.theme-modal-close{margin-top:18px;width:100%;padding:11px;border:none;background:var(--accent);color:#fff;border-radius:12px;font-size:14.5px;font-weight:600;transition:background .15s;}
.theme-modal-close:hover{background:var(--accent2);}
/* Sticker layer */
#stickerLayer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
#stickerLayer.placing{pointer-events:all;cursor:crosshair;}
.sticker{position:absolute;line-height:1;user-select:none;-webkit-user-select:none;pointer-events:all;animation:stickerPop .35s cubic-bezier(.34,1.56,.64,1) forwards;cursor:grab;transform-origin:center;touch-action:none;}
.sticker:active{cursor:grabbing;}
.sticker.selected{outline:2px dashed var(--accent);outline-offset:5px;border-radius:8px;}
.sticker-resize-handle{position:absolute;right:-8px;bottom:-8px;width:16px;height:16px;background:var(--surface);border:2px solid var(--accent);border-radius:50%;cursor:nwse-resize;opacity:0;pointer-events:none;touch-action:none;transition:opacity .15s;}
.sticker.selected .sticker-resize-handle{opacity:.85;pointer-events:all;}
.sticker-resize-handle:hover{opacity:1;transform:scale(1.15);}
.sticker-rotate-handle{position:absolute;left:-8px;top:-8px;width:16px;height:16px;background:var(--surface);border:2px solid var(--accent);border-radius:50%;cursor:grab;opacity:0;pointer-events:none;touch-action:none;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.sticker.selected .sticker-rotate-handle{opacity:.85;pointer-events:all;}
.sticker-rotate-handle:hover{opacity:1;transform:scale(1.15);}
.sticker-rotate-handle:active{cursor:grabbing;}
.sticker-rotate-handle svg{color:var(--accent);pointer-events:none;}
.sticker-toolbar{position:fixed;bottom:80px;right:20px;z-index:210;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.sticker-fab{width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:transform .2s,background .15s;}
.sticker-fab:hover{transform:scale(1.08);}
.sticker-fab.active{background:var(--neg-text);}
.sticker-panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.14);display:none;flex-wrap:wrap;gap:5px;width:290px;max-height:360px;overflow-y:auto;}
.sticker-panel.open{display:flex;}
.sticker-panel .sticker-tab-note{width:100%;font-size:11px;color:var(--muted2);font-weight:600;margin:0 0 4px;padding:0 2px;}
.sticker-pick{width:36px;height:36px;border:none;background:transparent;font-size:20px;border-radius:10px;cursor:pointer;transition:background .15s;flex:none;}
.sticker-pick:hover{background:var(--navHover);}
.sticker-pick.selected{background:var(--navActive);outline:2px solid var(--accent);}
.sticker-clear{margin-top:8px;width:100%;padding:7px;border:1px solid var(--border);background:transparent;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--muted2);transition:background .15s;}
.sticker-clear:hover{background:var(--btnRemoveHover);color:var(--btnRemoveHoverText);}
/* Week / month nav */
.wm-nav-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);color:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.wm-nav-btn:hover{background:var(--navHover);}
.wm-pill-btn{padding:0 14px;height:34px;border:1px solid var(--border);background:var(--surface);color:var(--accent);border-radius:10px;font-size:13px;font-weight:700;transition:background .15s;}
.wm-pill-btn:hover{background:var(--navHover);}
/* History modal */
/* Streak badge */
.streak-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accentBg2);color:var(--accent);font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;white-space:nowrap;}
/* Tag dots & filter chips */
.tag-dot{width:11px;height:11px;border-radius:50%;flex:none;border:1.5px solid var(--border);cursor:pointer;transition:transform .15s;}
.tag-dot:hover{transform:scale(1.25);}
.tag-chip{padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.tag-chip:hover{background:var(--navHover);}
.tag-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tag-chip .tag-dot-inline{width:8px;height:8px;border-radius:50%;flex:none;border:none;}
/* Recurring badge */
.recur-badge{width:26px;height:26px;flex:none;border:none;background:transparent;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--accentBar);transition:color .15s,background .15s;}
.recur-badge:hover{background:var(--navHover);}
.recur-badge.active{color:var(--accent);}
/* Mood check-in */
.mood-row{display:flex;gap:8px;flex-wrap:wrap;}
.mood-btn{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.mood-btn:hover{border-color:var(--accentMid);}
.mood-btn.selected{border-color:var(--accent);background:var(--accentBg2);transform:scale(1.08);}
/* Drag to reorder */
.task-row[draggable="true"]{cursor:grab;}
.task-row.dragging{opacity:.35;}
.task-row.drag-over{border-top:2px solid var(--accent);}
.drag-handle{flex:none;width:18px;color:var(--accentBar);display:flex;align-items:center;justify-content:center;cursor:grab;}
/* Insights chart */
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;}
.insight-bar-track{flex:1;display:flex;align-items:flex-end;gap:4px;height:90px;}
.insight-bar{flex:1;background:var(--ring-track);border-radius:4px 4px 0 0;position:relative;transition:height .4s cubic-bezier(.4,0,.2,1);min-height:3px;}
.insight-bar.filled{background:var(--accent);}
.insight-bar.today{background:var(--accent);box-shadow:0 0 0 2px var(--accentBg2);}
/* Settings */
.settings-section{margin-bottom:20px;}
.settings-section h3{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted3);font-weight:700;margin:0 0 10px;}
.settings-row-btn{width:100%;padding:11px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:11px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;transition:background .15s;margin-bottom:8px;}
.settings-row-btn:hover{background:var(--navHover);}
.quote-list-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13.5px;color:var(--text3);}
.quote-list-item span{flex:1;}
/* Calendar day modal */
.cal-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:150;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.cal-modal{background:var(--surface);border-radius:22px;padding:26px 28px 22px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:themePop .2s ease;}
.cal-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.cal-photo-cell{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:var(--border2);}
.cal-photo-cell img{width:100%;height:100%;object-fit:cover;display:block;}
.cal-photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cal-photo-add{aspect-ratio:1;border-radius:10px;border:2px dashed var(--accentBar);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.cal-photo-add:hover{background:var(--navHover);}
/* Task row tag color-coding (All view) */
.task-row-tag-work    { border-left:3px solid #6b7fd7; padding-left:7px !important; }
.task-row-tag-personal{ border-left:3px solid #7fa37f; padding-left:7px !important; }
.task-row-tag-health  { border-left:3px solid #d77f8a; padding-left:7px !important; }
.task-row-tag-errands { border-left:3px solid #d7a857; padding-left:7px !important; }
/* Tag chip active colors — match each tag */
.tag-chip.active-work    { background:#6b7fd7;border-color:#6b7fd7;color:#fff; }
.tag-chip.active-personal{ background:#7fa37f;border-color:#7fa37f;color:#fff; }
.tag-chip.active-health  { background:#d77f8a;border-color:#d77f8a;color:#fff; }
.tag-chip.active-errands { background:#d7a857;border-color:#d7a857;color:#fff; }

/* Tablet */
@media(max-width:1023px) and (min-width:768px){
  .sidebar-wrap{display:none;}.sidebar-toggle{display:none;}
  .mobile-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--topbarBg);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:30;flex:none;transition:background .3s;}
  .topbar-logo{display:flex;align-items:center;gap:10px;}
  .topbar-hamburger{width:38px;height:38px;border:none;background:transparent;color:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .topbar-hamburger:hover{background:var(--navHover);}
  .drawer-overlay{display:block;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .25s;}
  .drawer-overlay.open{opacity:1;pointer-events:all;}
  .drawer-panel{position:fixed;top:0;left:0;bottom:0;width:264px;background:var(--sidebarBg);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;padding:26px 18px 22px;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1),background .3s;overflow-y:auto;}
  .drawer-overlay.open .drawer-panel{transform:translateX(0);}
  .app{flex-direction:column;height:100vh;overflow:hidden;}
  .main{flex:1;overflow-y:auto;}.main-inner{padding:32px 28px 80px;max-width:100%;}
  .today-grid{grid-template-columns:1fr;}.budget-summary{grid-template-columns:1fr 1fr;}.selfcare-grid{grid-template-columns:1fr 1fr;}.notes-masonry{columns:2;}.week-grid{grid-template-columns:repeat(4,1fr);}.section-title{font-size:32px;}
  .sticker-toolbar{bottom:20px;}
}
/* Mobile */
@media(max-width:767px){
  .sidebar-wrap{display:none;}.sidebar-toggle{display:none;}
  .mobile-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--topbarBg);border-bottom:1px solid var(--border);padding:13px 16px;position:sticky;top:0;z-index:30;flex:none;transition:background .3s;}
  .topbar-logo{display:flex;align-items:center;gap:9px;}
  .topbar-hamburger{width:36px;height:36px;border:none;background:transparent;color:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .drawer-overlay{display:block;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .25s;}
  .drawer-overlay.open{opacity:1;pointer-events:all;}
  .drawer-panel{position:fixed;top:0;left:0;bottom:0;width:244px;background:var(--sidebarBg);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;padding:22px 14px 80px;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1),background .3s;overflow-y:auto;}
  .drawer-overlay.open .drawer-panel{transform:translateX(0);}
  .app{flex-direction:column;height:100vh;overflow:hidden;}
  .main{flex:1;overflow-y:auto;}.main-inner{padding:18px 14px 96px;max-width:100%;}
  .mobile-bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--topbarBg);border-top:1px solid var(--border);padding:0 4px env(safe-area-inset-bottom,0);height:64px;align-items:stretch;transition:background .3s;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted3);padding:6px 2px;font-size:10px;font-weight:600;letter-spacing:.03em;transition:color .15s;border-top:2px solid transparent;}
  .bnav-btn.active{color:var(--accent);border-top-color:var(--bnav-active-border);}
  .today-grid{grid-template-columns:1fr;}.budget-summary{grid-template-columns:1fr;}.selfcare-grid{grid-template-columns:1fr;}.notes-masonry{columns:1;}.week-grid{grid-template-columns:1fr;}.section-title{font-size:28px;}.section-sub{font-size:14px;margin-bottom:20px;}.card{padding:18px;}
  .month-week-row .mcell{min-height:80px;padding:6px 5px;}.month-header-row span{font-size:11px;padding:10px 0;}
  .sticker-toolbar{bottom:76px;right:12px;}
}

// Migrations / ensure shape — also called after importing a backup
function ensureStateShape(){
  if(!state.history) state.history={};

  if(state.stickers){ state.stickersByView.today=state.stickers; delete state.stickers; }

  if(state.viewMonthOffset===undefined||state.viewMonthOffset===null) state.viewMonthOffset=0;
  if(!state.calendarNotes) state.calendarNotes={};
  if(!state.calendarPhotos) state.calendarPhotos={};
  if(state.selectedCalDay===undefined) state.selectedCalDay=null;
  if(!state.moodLog) state.moodLog={};
  if(!state.customQuotes) state.customQuotes=[];
  if(state.taskFilterTag===undefined) state.taskFilterTag=null;
  let nextOrder=1;
  (state.tasks||[]).forEach(t=>{
    if(t.tag===undefined) t.tag=null;
    if(t.recurring===undefined) t.recurring=null;
    if(t.recurDay===undefined) t.recurDay=null;

  });

}

// ── TASK / DAY LOGIC ───────────────────────────────────────────────────
// Carry-over: on load, snapshot yesterday's tasks into history (if not done yet),
// carry unfinished non-recurring tasks into today, and regenerate fresh
// instances of any daily/weekly recurring tasks for today.
function runDayRollover(){
  const tk=todayKey();
  const todayWeekday=(new Date().getDay()+6)%7; // Mon=0..Sun=6
  const newTasks=[];
  const fresh=[];
  let maxOrder=0;
  state.tasks.forEach(t=>{
    if(t.order>maxOrder) maxOrder=t.order;
    if(t.dayKey && t.dayKey<tk){
      // Make sure that past day's history captured this task before we move on
      if(!state.history[t.dayKey]) state.history[t.dayKey]=[];
      if(!state.history[t.dayKey].some(h=>h.id===t.id)){
        state.history[t.dayKey].push({id:t.id,text:t.text,done:t.done});
      }
      const weeklyDue=t.recurring==='weekly'&&t.recurDay===todayWeekday;
      if(t.recurring==='daily'||weeklyDue){
        // Regenerate a fresh, unchecked copy for today; the original stays
        // behind as a historical record (already snapshotted above).
        fresh.push({...t,id:uid(),done:false,dayKey:tk,order:0});
        return;
      }
      if(!t.done){ newTasks.push({...t,dayKey:tk}); return; } // normal carry-over
      newTasks.push(t); // completed — keep as historical record
      return;
    }
    newTasks.push(t);
  });
  fresh.forEach(t=>{ maxOrder+=1000; t.order=maxOrder; newTasks.push(t); });
  state.tasks=newTasks;
  save();
}
runDayRollover();

// Snapshot today into history (called on day change detection)
function snapshotToday(){
  const tk=todayKey();
  const todayTasks=state.tasks.filter(t=>t.dayKey===tk||!t.dayKey);
  if(todayTasks.length>0){
    state.history[tk]=todayTasks.map(t=>({id:t.id,text:t.text,done:t.done}));
    save();
  }
}

// Tasks shown in "Today" view = those with dayKey === today, in user order
function todayTasks(){ const tk=todayKey(); return state.tasks.filter(t=>t.dayKey===tk||!t.dayKey).sort((a,b)=>(a.order||0)-(b.order||0)); }

// Tasks for any date key (past/today/future) — used by Week & Month views
// Today & future: live, editable tasks. Past: prefer the history snapshot
// (carried-over unfinished tasks have already moved to today by then).
function tasksForDate(dk){
  const tk=todayKey();
  if(dk>=tk) return state.tasks.filter(t=>t.dayKey===dk);
  if(state.history[dk]) return state.history[dk];
  return state.tasks.filter(t=>t.dayKey===dk);
}
function getCalNote(dk){ return (state.calendarNotes&&state.calendarNotes[dk])||''; }

// ── STREAK ─────────────────────────────────────────────────────────────
// Consecutive days (ending today) where every task on that day was completed
function getAllDoneStreak(){
  let streak=0;
  const tt=todayTasks();
  if(tt.length>0&&tt.every(t=>t.done)) streak++;
  else return 0;
  let d=addDays(new Date(),-1);
  for(let i=0;i<365;i++){
    const dk=dateToKey(d);
    const tasks=state.history[dk];
    if(tasks&&tasks.length>0&&tasks.every(t=>t.done)){ streak++; d=addDays(d,-1); }
    else break;
  }
  return streak;
}

// ── TAGS ───────────────────────────────────────────────────────────────
function cycleTag(id){
  setState({tasks:state.tasks.map(t=>{
    if(t.id!==id) return t;
    const idx=TAGS.findIndex(g=>g.key===t.tag);
    const next=(idx===-1)?TAGS[0].key:(idx+1<TAGS.length?TAGS[idx+1].key:null);
    return {...t,tag:next};
  })});
}
function setTaskFilter(tagKey){ setState({taskFilterTag: state.taskFilterTag===tagKey?null:tagKey}); }

// ── RECURRING TASKS ────────────────────────────────────────────────────
function cycleRecurring(id){
  setState({tasks:state.tasks.map(t=>{
    if(t.id!==id) return t;
    let next, recurDay=t.recurDay;
    if(!t.recurring) next='daily';
    else if(t.recurring==='daily') next='weekly';
    else next=null;
    if(next==='weekly'){ const d=new Date((t.dayKey||todayKey())+'T12:00:00'); recurDay=(d.getDay()+6)%7; }
    else if(next===null) recurDay=null;
    return {...t,recurring:next,recurDay};
  })});
}
function recurLabel(t){
  if(t.recurring==='daily') return 'Repeats daily';
  if(t.recurring==='weekly') return 'Repeats weekly on '+DAYS[t.recurDay];

}

function exportData(){

function importData(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed||!parsed.week||!parsed.meals){ alert("That file doesn't look like a Sage Planner backup."); return; }
      state=parsed;
      ensureStateShape();
      runDayRollover();
      save();
      closeSettings();
      render();
    }catch(err){ alert("Could not read that file — make sure it's a Sage Planner .json backup."); }
  };
  reader.readAsText(file);
}

let dragTaskId=null;
function taskDragStart(ev,id){ dragTaskId=id; ev.dataTransfer.effectAllowed='move'; ev.currentTarget.classList.add('dragging'); }
function taskDragEnd(ev){ ev.currentTarget.classList.remove('dragging'); document.querySelectorAll('.task-row.drag-over').forEach(el=>el.classList.remove('drag-over')); }

function taskDragLeave(ev){ ev.currentTarget.classList.remove('drag-over'); }
function taskDrop(ev,targetId){
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  if(!dragTaskId||dragTaskId===targetId) return;
  const tt=todayTasks();
  const ids=tt.map(t=>t.id);
  const from=ids.indexOf(dragTaskId), to=ids.indexOf(targetId);
  if(from<0||to<0) return;
  ids.splice(to,0,ids.splice(from,1)[0]);
  // Reassign sequential order values to the reordered today-list
  const orderMap={}; ids.forEach((id,i)=>orderMap[id]=(i+1)*1000);
  setState({tasks:state.tasks.map(t=>orderMap[t.id]!==undefined?{...t,order:orderMap[t.id]}:t)});
  dragTaskId=null;
}

          <input id="taskInp" class="inp" value="${esc(state.taskDraft)}" placeholder="${state.taskFilterTag?'Add a '+TAGS.find(g=>g.key===state.taskFilterTag)?.label+' task…':'Add a task… ( / )'}"
            style="flex:1;min-width:0;" oninput="state.taskDraft=this.value" onkeydown="if(event.key==='Enter'){addTask();}">
          <button class="btn-icon-add" onclick="addTask()">+</button>
        </div>
        ${allDone()?`<div style="display:flex;gap:12px;align-items:center;background:var(--accentBg2);border-radius:14px;padding:14px 16px;margin-bottom:12px;">
          <span style="width:34px;height:34px;flex:none;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"></path></svg>
          </span>
          <div><p style="margin:0;font-weight:700;font-size:14px;color:var(--text);">All done for today 🎉</p><p style="margin:2px 0 0;font-size:13px;color:var(--text3);">You cleared your list!</p></div>
        </div>`:''}
        <div style="display:flex;flex-direction:column;gap:2px;">
          ${visibleTasks.map(t=>{
            const tg=tagInfo(t.tag);
            // In "All" view, show a color-coded left border for each tag
            const showColorBorder = !state.taskFilterTag && tg;
            return `
          <div class="task-row${showColorBorder?' task-row-tag-'+tg.key:''}" draggable="true"
            ondragstart="taskDragStart(event,'${t.id}')" ondragend="taskDragEnd(event)"
            ondragover="taskDragOver(event)" ondragleave="taskDragLeave(event)" ondrop="taskDrop(event,'${t.id}')"
            style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border2)${showColorBorder?';border-left:3px solid '+tg.color+';padding-left:7px':''};">
            <span class="drag-handle" title="Drag to reorder">${svgIcon('<circle cx="9" cy="6" r="1" fill="currentColor" stroke="none"></circle><circle cx="9" cy="12" r="1" fill="currentColor" stroke="none"></circle><circle cx="9" cy="18" r="1" fill="currentColor" stroke="none"></circle><circle cx="15" cy="6" r="1" fill="currentColor" stroke="none"></circle><circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"></circle><circle cx="15" cy="18" r="1" fill="currentColor" stroke="none"></circle>',16)}</span>
            <button onclick="toggleTask('${t.id}')" style="flex:none;width:23px;height:23px;border-radius:7px;border:2px solid ${t.done?'var(--done-fill)':'var(--accentBar)'};background:${t.done?'var(--done-fill)':'var(--surface)'};display:flex;align-items:center;justify-content:center;padding:0;transition:all .2s;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:${t.done?1:0};"><path d="m5 12.5 4.5 4.5L19 7"></path></svg>
            </button>
            <button class="tag-dot" onclick="cycleTag('${t.id}')" title="${tg?tg.label:'No tag — click to add one'}" style="background:${tg?tg.color:'transparent'};"></button>
            <span style="flex:1;font-size:14.5px;font-weight:500;color:${t.done?'var(--done-text)':'var(--text)'};text-decoration:${t.done?'line-through':'none'};">${esc(t.text)}</span>
            <button class="recur-badge${t.recurring?' active':''}" onclick="cycleRecurring('${t.id}')" title="${recurLabel(t)}">${t.recurring==='weekly'?'📅':'🔁'}</button>
            <button onclick="prioTask('${t.id}')" style="flex:none;width:26px;height:26px;border:none;background:transparent;border-radius:7px;display:flex;align-items:center;justify-content:center;color:${t.priority?'var(--accent)':'var(--accentBar)'};">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4M5 4h11l-2 3.5L16 11H5"></path></svg>
            </button>
            <button class="btn-remove" onclick="removeTask('${t.id}')">×</button>
          </div>`;}).join('')}
        </div>
        ${total===0?`<p style="text-align:center;color:var(--muted2);font-size:14px;padding:20px 0 6px;margin:0;">No tasks yet — add your first one above.</p>`:''}
        ${total>0&&visibleTasks.length===0?`<p style="text-align:center;color:var(--muted2);font-size:14px;padding:20px 0 6px;margin:0;">No tasks with this tag.</p>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:20px;">
        <div class="card" style="text-align:center;">
          <h2 class="card-label" style="margin-bottom:16px;">Progress</h2>
          <div style="position:relative;width:130px;height:130px;margin:0 auto;">
            <svg width="130" height="130" viewBox="0 0 130 130">
              <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--ring-track)" stroke-width="12"></circle>
              <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round"
                stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
                transform="rotate(-90 65 65)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"></circle>
            </svg>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
              <span style="font-size:30px;font-weight:800;color:var(--accent);line-height:1;">${pct}%</span>
              <span style="font-size:11px;color:var(--muted2);font-weight:600;margin-top:2px;">${done} of ${total}</span>
            </div>
          </div>
        </div>
        <div class="card">
          <h2 class="card-label" style="margin-bottom:13px;">Today's focus</h2>
          ${priorities.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;"><span style="width:7px;height:7px;flex:none;background:var(--accent);border-radius:50%;"></span><span style="font-size:14px;color:var(--text3);font-weight:500;">${esc(t.text)}</span></div>`).join('')}
          ${priorities.length===0?`<p style="margin:0;font-size:13px;color:var(--muted2);line-height:1.5;">Flag a task with the flag icon to keep it front of mind.</p>`:''}
        </div>
      </div>
    </div>
  </div>`;
}
function addTask(){
  const t=state.taskDraft.trim(); if(!t) return;
  const maxOrder=state.tasks.reduce((m,x)=>Math.max(m,x.order||0),0);
  // Inherit the currently active tag filter so the task immediately appears in that category view
  const inheritedTag = state.taskFilterTag || null;
  const newTask={id:uid(),text:t,done:false,priority:false,dayKey:todayKey(),tag:inheritedTag,recurring:null,recurDay:null,order:maxOrder+1000};
  setState({tasks:[...state.tasks,newTask],taskDraft:''});
}
function toggleTask(id){ setState({tasks:state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t)}); }
function removeTask(id){ setState({tasks:state.tasks.filter(t=>t.id!==id)}); }
function prioTask(id){ setState({tasks:state.tasks.map(t=>t.id===id?{...t,priority:!t.priority}:t)}); }

// ── WEEK ───────────────────────────────────────────────────────────────
function shiftWeek(delta){ setState({viewWeekStart:dateToKey(addDays(new Date(state.viewWeekStart+'T12:00:00'),delta*7))}); }
function resetWeek(){ setState({viewWeekStart:dateToKey(getMonday(new Date()))}); }

function renderWeek(){
  const monday=new Date(state.viewWeekStart+'T12:00:00');
  const weekDates=getWeekDatesFrom(monday);
  const tk=todayKey();
  const isCurrentWeek=state.viewWeekStart===dateToKey(getMonday(new Date()));
  // Per-day stats (used for both the progress meter and the recap card)
  const dayStats=weekDates.map((d,i)=>{
    const dk=dateToKey(d);
    const tasks=tasksForDate(dk);
    const dDone=tasks.filter(t=>t.done).length, dTotal=tasks.length;
    return {dayLabel:DAYS[i],dk,d,dDone,dTotal,pct:dTotal?dDone/dTotal:0};
  });
  const weekTotal=dayStats.reduce((a,s)=>a+s.dTotal,0);
  const weekDone=dayStats.reduce((a,s)=>a+s.dDone,0);
  const weekPct=weekTotal>0?Math.round(weekDone/weekTotal*100):0;
  const rangeLabel=weekDates[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+weekDates[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  // Recap: best day (highest completion, must have at least 1 task)
  const ranked=dayStats.filter(s=>s.dTotal>0).sort((a,b)=>b.pct-a.pct||b.dDone-a.dDone);
  const bestDay=ranked[0];
  const streak=getAllDoneStreak();
  const totalExp=state.budget.expenses.reduce((a,e)=>a+e.amount,0);
  const remaining=state.budget.income-totalExp;
  return `<div class="view">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:4px;">
      <div>
        <h1 class="section-title" style="margin:0;">${isCurrentWeek?'This week':'Week of'}</h1>
        <p style="margin:4px 0 0;font-size:14px;color:var(--muted2);font-weight:600;">${rangeLabel}</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="wm-nav-btn" onclick="shiftWeek(-1)" title="Previous week">${svgIcon('<path d="M15 18l-6-6 6-6"></path>',16)}</button>
        ${isCurrentWeek?'':`<button class="wm-pill-btn" onclick="resetWeek()">Today</button>`}
        <button class="wm-nav-btn" onclick="shiftWeek(1)" title="Next week">${svgIcon('<path d="M9 18l6-6-6-6"></path>',16)}</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin:16px 0 18px;">
      <div style="flex:1;height:8px;background:var(--ring-track);border-radius:6px;overflow:hidden;">
        <div style="height:100%;width:${weekPct}%;background:var(--accent);border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);"></div>
      </div>
      <span style="font-size:13px;color:var(--muted2);font-weight:600;white-space:nowrap;">${weekDone}/${weekTotal} tasks</span>
      <span style="font-size:18px;font-weight:800;color:var(--accent);min-width:48px;text-align:right;">${weekPct}%</span>
    </div>
    <div class="card" style="margin-bottom:22px;padding:16px 20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:18px;">🔥</span>
        <div><p style="margin:0;font-size:12px;color:var(--muted2);font-weight:600;">Current streak</p><p style="margin:0;font-size:14.5px;font-weight:700;color:var(--text);">${streak} day${streak===1?'':'s'}</p></div>
      </div>
      ${bestDay?`<div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:18px;">⭐</span>
        <div><p style="margin:0;font-size:12px;color:var(--muted2);font-weight:600;">Best day</p><p style="margin:0;font-size:14.5px;font-weight:700;color:var(--text);">${bestDay.dayLabel} · ${bestDay.dDone}/${bestDay.dTotal} done</p></div>
      </div>`:''}
      ${isCurrentWeek?`<div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:18px;">💰</span>
        <div><p style="margin:0;font-size:12px;color:var(--muted2);font-weight:600;">Budget remaining</p><p style="margin:0;font-size:14.5px;font-weight:700;color:${remaining<0?'var(--neg-text)':'var(--text)'};">${fmt(remaining)}</p></div>
      </div>`:''}
    </div>
    <div class="week-grid">
      ${dayStats.map(s=>{
        const {dayLabel,dk,d,dDone,dTotal}=s;
        const isT=dk===tk;
        const isPast=dk<tk;
        const editable=!isPast;
        const dayNum=d.getDate();
        const monthShort=d.toLocaleDateString('en-US',{month:'short'});
        const tasks=tasksForDate(dk);
        return `<div style="background:var(--surface);border:1px solid ${isT?'var(--accentBar)':'var(--border)'};border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:${isT?'0 8px 24px -18px rgba(0,0,0,.2)':'0 1px 2px rgba(0,0,0,.03)'};opacity:${isPast?.85:1};">
          <div style="padding:9px 12px;background:${isT?'var(--accent)':'var(--accentBg)'};color:${isT?'#fff':'var(--text2)'};">
            <div style="font-size:12px;font-weight:800;letter-spacing:.04em;">${dayLabel}${isT?' · Today':''}</div>
            <div style="font-size:18px;font-weight:700;line-height:1.1;">${dayNum}</div>
            <div style="font-size:10.5px;opacity:.75;">${monthShort}</div>
          </div>
          ${dTotal>0?`<div style="padding:7px 10px 4px;border-bottom:1px solid var(--border2);">
            <div style="height:4px;background:var(--ring-track);border-radius:3px;overflow:hidden;">
              <div style="height:100%;width:${Math.round(dDone/dTotal*100)}%;background:var(--accent);border-radius:3px;"></div>
            </div>
            <p style="font-size:10.5px;color:var(--muted2);font-weight:600;margin:3px 0 0;">${dDone}/${dTotal}</p>
          </div>`:''}
          <div style="display:flex;flex-direction:column;gap:5px;padding:8px 8px;min-height:80px;">
            ${tasks.map(t=>{ const tg=tagInfo(t.tag); return `<div style="display:flex;align-items:center;gap:7px;${editable?'cursor:pointer;':''}" ${editable?`onclick="toggleTaskByDay('${t.id}')"`:''}>
              <span style="width:9px;height:9px;flex:none;border-radius:50%;border:2px solid ${t.done?'var(--done-fill)':'var(--accentBar)'};background:${t.done?'var(--done-fill)':'transparent'};"></span>
              ${tg?`<span style="width:7px;height:7px;flex:none;border-radius:50%;background:${tg.color};"></span>`:''}
              <span style="font-size:11.5px;color:${t.done?'var(--done-text)':'var(--text)'};text-decoration:${t.done?'line-through':'none'};font-weight:500;line-height:1.2;">${esc(t.text)}</span>
            </div>`;}).join('')}
            ${getCalNote(dk)?`<div style="margin-top:4px;padding:5px 7px;background:var(--accentBg);border-radius:7px;cursor:pointer;" onclick="openCalModal('${dk}')">
              <p style="margin:0;font-size:10.5px;color:var(--text3);line-height:1.35;font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${esc(getCalNote(dk))}</p>
            </div>`:''}
            ${editable?`<input value="${esc((state.weekDraft||{})[dk]||'')}" placeholder="+ add task"
              style="width:100%;padding:5px 6px;border:1px dashed var(--accentBar);border-radius:7px;font-size:11.5px;outline:none;background:transparent;color:var(--text);margin-top:auto;"
              oninput="state.weekDraft['${dk}']=this.value"
              onkeydown="if(event.key==='Enter'){addWeekTask('${dk}',this);}">`
              :(dTotal===0&&!getCalNote(dk)?`<p style="font-size:10.5px;color:var(--muted2);text-align:center;padding:8px 0;margin:0;">No tasks recorded</p>`:'')}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}
function toggleTaskByDay(id){ setState({tasks:state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t)}); }
function addWeekTask(dk){
  const v=(state.weekDraft[dk]||'').trim(); if(!v) return;
  state.weekDraft[dk]='';
  const maxOrder=state.tasks.reduce((m,x)=>Math.max(m,x.order||0),0);
  const newTask={id:uid(),text:v,done:false,priority:false,dayKey:dk,tag:null,recurring:null,recurDay:null,order:maxOrder+1000};
  setState({tasks:[...state.tasks,newTask]});
}

// ── MONTH ──────────────────────────────────────────────────────────────
function shiftMonth(delta){ setState({viewMonthOffset:state.viewMonthOffset+delta}); }
function resetMonth(){ setState({viewMonthOffset:0}); }
// Opens the day detail modal from the Month tab (does NOT navigate away)
function openCalModal(dk){
  state.selectedCalDay=dk;
  save();
  renderCalModal();
  document.getElementById('calDayModal').style.display='flex';
}
function closeCalModal(){
  document.getElementById('calDayModal').style.display='none';
  state.selectedCalDay=null;
  save();
}

// Keep goToWeekOf for any other use (e.g., settings/links), but the month
// grid now calls openCalModal, so this is only invoked explicitly.
function goToWeekOf(dk){
  const d=new Date(dk+'T12:00:00');
  setState({viewWeekStart:dateToKey(getMonday(d)),view:'week'});
}

function renderCalModal(){
  const dk=state.selectedCalDay; if(!dk) return;
  const dateObj=new Date(dk+'T12:00:00');
  const label=dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const isToday=dk===todayKey();
  const note=state.calendarNotes[dk]||'';
  const photos=state.calendarPhotos[dk]||[];
  const tasks=tasksForDate(dk);
  const done=tasks.filter(t=>t.done).length;

  document.getElementById('calDayModalContent').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;">
      <div>
        <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 4px;">${isToday?'Today':'Calendar'}</p>
        <h2 style="font-family:'Newsreader',serif;font-size:24px;font-weight:400;color:var(--text);margin:0;">${label}</h2>
        ${tasks.length>0?`<p style="margin:4px 0 0;font-size:12.5px;color:var(--muted2);font-weight:600;">${done}/${tasks.length} tasks done</p>`:''}
      </div>
      <button onclick="closeCalModal()" style="flex:none;width:32px;height:32px;border:1px solid var(--border);background:var(--surface);border-radius:50%;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;">×</button>
    </div>

    <!-- Notes (syncs to Today/Week) -->
    <div style="margin-bottom:22px;">
      <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted3);font-weight:700;margin:0 0 8px;">Notes <span style="font-size:10px;color:var(--muted2);letter-spacing:0;text-transform:none;font-weight:500;">— syncs to Today & Week views</span></p>
      <textarea id="calNoteArea" placeholder="Write a note for this day…" rows="3"
        style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;color:var(--text);background:var(--inpBg);outline:none;resize:vertical;font-family:inherit;line-height:1.5;"
        oninput="saveCalNote('${dk}',this.value)">${esc(note)}</textarea>
    </div>

    <!-- Photos (calendar-only) -->
    <div style="margin-bottom:22px;">
      <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted3);font-weight:700;margin:0 0 8px;">Photos <span style="font-size:10px;color:var(--muted2);letter-spacing:0;text-transform:none;font-weight:500;">— calendar only</span></p>
      <div class="cal-photo-grid" id="calPhotoGrid">
        ${photos.map((src,i)=>`<div class="cal-photo-cell">
          <img src="${src}" alt="Photo ${i+1}">
          <button class="cal-photo-del" onclick="delCalPhoto('${dk}',${i})">×</button>
        </div>`).join('')}
        <label class="cal-photo-add">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M17 8l-5-5-5 5"></path><path d="M12 3v12"></path></svg>
          Add photo
          <input type="file" accept="image/*" multiple style="display:none;" onchange="addCalPhotos('${dk}',this)">
        </label>
      </div>
    </div>

    <!-- Tasks summary -->
    ${tasks.length>0?`<div>
      <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted3);font-weight:700;margin:0 0 10px;">Tasks</p>
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${tasks.map(t=>{const tg=tagInfo(t.tag);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border2);">
          <span style="flex:none;width:18px;height:18px;border-radius:5px;border:2px solid ${t.done?'var(--done-fill)':'var(--accentBar)'};background:${t.done?'var(--done-fill)':'transparent'};display:flex;align-items:center;justify-content:center;">
            ${t.done?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"></path></svg>`:''}
          </span>
          ${tg?`<span style="width:8px;height:8px;flex:none;border-radius:50%;background:${tg.color};"></span>`:''}
          <span style="flex:1;font-size:13.5px;color:${t.done?'var(--done-text)':'var(--text)'};text-decoration:${t.done?'line-through':'none'};font-weight:500;">${esc(t.text)}</span>
          <span style="font-size:11px;color:${t.done?'var(--done-fill)':'var(--muted2)'};font-weight:700;">${t.done?'Done':'Pending'}</span>
        </div>`;}).join('')}
      </div>
    </div>`:''}

    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
      <button onclick="goToWeekOf('${dk}');closeCalModal();" style="flex:1;padding:11px;border:1px solid var(--border);background:var(--surface);color:var(--accent);border-radius:12px;font-size:13.5px;font-weight:600;">Go to this week →</button>
      <button onclick="closeCalModal()" style="flex:1;padding:11px;border:none;background:var(--accent);color:#fff;border-radius:12px;font-size:13.5px;font-weight:600;">Done</button>
    </div>`;
}

function saveCalNote(dk,val){
  if(val.trim()) state.calendarNotes[dk]=val;
  else delete state.calendarNotes[dk];
  save();
}
function addCalPhotos(dk,input){
  const files=Array.from(input.files); if(!files.length) return;
  let done=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      if(!state.calendarPhotos[dk]) state.calendarPhotos[dk]=[];
      state.calendarPhotos[dk].push(e.target.result);
      done++;
      if(done===files.length){ save(); renderCalModal(); }
    };
    reader.readAsDataURL(file);
  });
}
function delCalPhoto(dk,idx){
  state.calendarPhotos[dk]=state.calendarPhotos[dk].filter((_,i)=>i!==idx);
  if(!state.calendarPhotos[dk].length) delete state.calendarPhotos[dk];
  save();
  renderCalModal();
}

function renderMonth(){
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth()+state.viewMonthOffset,1);
  const year=base.getFullYear(),month=base.getMonth();
  const monthName=base.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const firstDay=new Date(year,month,1).getDay(),startOffset=(firstDay+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const tk=todayKey();
  const cells=[]; for(let i=0;i<startOffset;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `<div class="view">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px;">
      <h1 class="section-title" style="margin:0;">${monthName}</h1>
      <div style="display:flex;align-items:center;gap:8px;padding-bottom:4px;">
        <button class="wm-nav-btn" onclick="shiftMonth(-1)" title="Previous month">${svgIcon('<path d="M15 18l-6-6 6-6"></path>',16)}</button>
        ${state.viewMonthOffset!==0?`<button class="wm-pill-btn" onclick="resetMonth()">Today</button>`:''}
        <button class="wm-nav-btn" onclick="shiftMonth(1)" title="Next month">${svgIcon('<path d="M9 18l6-6-6-6"></path>',16)}</button>
      </div>
    </div>
    <p class="section-sub">Click any date to add notes, photos, or review tasks.</p>
    <div class="card-sm" style="overflow:hidden;">
      <div class="month-header-row" style="background:var(--accentBg);border-bottom:1px solid var(--border);">
        ${dayNames.map(d=>`<span style="padding:12px 0;text-align:center;font-size:12px;font-weight:700;color:var(--muted3);letter-spacing:.04em;display:block;">${d}</span>`).join('')}
      </div>
      ${(()=>{
        let rows='';
        for(let r=0;r<cells.length/7;r++){
          rows+=`<div class="month-week-row" style="border-bottom:1px solid var(--border2);">`;
          for(let c=0;c<7;c++){
            const day=cells[r*7+c];
            const isToday=day!==null&&(year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0'))===tk;
            const isWeekend=c>=5;
            if(day){
              const dk=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
              const dayTasks=tasksForDate(dk);
              const hDone=dayTasks.filter(t=>t.done).length;
              const hTotal=dayTasks.length;
              const hasData=hTotal>0;
              const hasNote=!!(state.calendarNotes[dk]&&state.calendarNotes[dk].trim());
              const hasPhotos=!!(state.calendarPhotos[dk]&&state.calendarPhotos[dk].length);
              const noteText=hasNote?state.calendarNotes[dk].trim():'';
              const photos=hasPhotos?state.calendarPhotos[dk]:[];
              rows+=`<div class="mcell" style="min-height:110px;padding:8px 9px;border-right:${c<6?'1px solid var(--border2)':'none'};background:${isToday?'var(--today-highlight)':'var(--surface)'};cursor:pointer;transition:background .15s;vertical-align:top;" onmouseover="this.style.background='var(--navHover)'" onmouseout="this.style.background='${isToday?'var(--today-highlight)':'var(--surface)'}'" onclick="openCalModal('${dk}')">
                <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:${isToday?'800':'600'};color:${isToday?'#fff':isWeekend?'var(--weekend-color)':'var(--text3)'};background:${isToday?'var(--accent)':'transparent'};flex:none;">${day}</span>
                ${hasData?`<div style="margin-top:3px;height:3px;background:var(--ring-track);border-radius:2px;overflow:hidden;"><div style="height:100%;width:${Math.round(hDone/hTotal*100)}%;background:${hDone===hTotal?'var(--done-fill)':'var(--accentMid)'};border-radius:2px;"></div></div>`:''}
                ${hasNote?`<p style="margin:5px 0 0;font-size:10px;color:var(--text3);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;">${esc(noteText)}</p>`:''}
                ${photos.length>0?`<div style="display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;">
                  ${photos.slice(0,3).map((src,i)=>`<img src="${src}" style="width:${photos.length===1?'100%':'calc(50% - 2px)'};max-width:${photos.length===1?'100%':'52px'};aspect-ratio:1;object-fit:cover;border-radius:5px;display:block;">`).join('')}
                  ${photos.length>3?`<div style="width:calc(50% - 2px);max-width:52px;aspect-ratio:1;border-radius:5px;background:var(--accentBg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted3);">+${photos.length-3}</div>`:''}
                </div>`:''}
              </div>`;
            } else {
              rows+=`<div class="mcell" style="min-height:72px;padding:8px 10px;border-right:${c<6?'1px solid var(--border2)':'none'};background:var(--surface);"></div>`;
            }
          }
          rows+=`</div>`;
        }
        return rows;
      })()}
    </div>
  </div>`;
}

      </div>
      <div class="card-sm" style="padding:18px 20px;background:${neg?'var(--neg-bg)':'var(--accentBg)'};border-color:${neg?'var(--neg-border)':'var(--accentBar)'};">
        <p style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:700;margin:0 0 8px;">Remaining</p>
        <p style="font-size:24px;font-weight:800;color:${neg?'var(--neg-text)':'var(--accent)'};margin:0;">${fmt(remaining)}</p>

    <div style="height:10px;background:var(--ring-track);border-radius:7px;overflow:hidden;margin-bottom:28px;">

      <input class="inp" value="${esc(state.expLabel)}" placeholder="What for?" style="flex:1;min-width:120px;" oninput="state.expLabel=this.value" onkeydown="if(event.key==='Enter'){addExpense();}">
      <input class="inp" type="number" value="${esc(state.expAmount)}" placeholder="$0" style="width:100px;flex:none;" oninput="state.expAmount=this.value" onkeydown="if(event.key==='Enter'){addExpense();}">
      <button class="btn-primary" style="height:46px;padding:0 18px;" onclick="addExpense()">Add</button>
    </div>
    <div class="card-sm">
      ${state.budget.expenses.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border2);">
        <span style="font-size:14px;color:var(--text);font-weight:500;">${esc(e.label)}</span>
        <div style="display:flex;align-items:center;gap:12px;"><span style="font-size:14px;font-weight:700;color:var(--accent);">${fmt(e.amount)}</span><button class="btn-remove" onclick="removeExpense('${e.id}')">×</button></div>
      </div>`).join('')}
      ${state.budget.expenses.length===0?`<p style="text-align:center;color:var(--muted2);font-size:14px;padding:20px;margin:0;">No expenses logged yet.</p>`:''}

function setIncome(v){ const n=parseFloat(v); setState({budget:{...state.budget,income:isNaN(n)?0:n}}); }
function addExpense(){ const l=state.expLabel.trim(),a=parseFloat(state.expAmount); if(!l||isNaN(a)) return; setState({budget:{...state.budget,expenses:[...state.budget.expenses,{id:uid(),label:l,amount:a}]},expLabel:'',expAmount:''}); }
function removeExpense(id){ setState({budget:{...state.budget,expenses:state.budget.expenses.filter(x=>x.id!==id)}}); }

        </button>

        ${it.done?(it.loggedExpense?`<span style="font-size:12px;font-weight:700;color:var(--accent);background:var(--accentBg2);padding:5px 10px;border-radius:999px;white-space:nowrap;">✓ ${fmt(it.cost||0)} logged</span>`
          :`<div style="display:flex;align-items:center;gap:6px;">
              <input type="number" placeholder="$ cost" value="${it.cost!==null?it.cost:''}" style="width:78px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;outline:none;background:var(--inpBg);color:var(--text);"
                oninput="setShopCost('${it.id}',this.value)" onkeydown="if(event.key==='Enter'){logShopExpense('${it.id}');}">
              <button onclick="logShopExpense('${it.id}')" style="flex:none;padding:6px 10px;border:1px solid var(--border);background:var(--surface);color:var(--accent);border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;">Log to budget</button>

    <p style="font-size:12px;color:var(--muted2);margin:10px 2px 0;">Tip: check an item off, enter what it cost, and "Log to budget" adds it to your Budget expenses automatically.</p>

function addShop(){ const t=state.shopDraft.trim(); if(!t) return; setState({shopping:[...state.shopping,{id:uid(),text:t,done:false,cost:null,loggedExpense:false}],shopDraft:''}); }
function toggleShop(id){ setState({shopping:state.shopping.map(s=>s.id===id?{...s,done:!s.done}:s)}); }
function removeShop(id){ setState({shopping:state.shopping.filter(s=>s.id!==id)}); }
function clearChecked(){ setState({shopping:state.shopping.filter(s=>!s.done)}); }
function setShopCost(id,val){
  const n=val===''?null:parseFloat(val);
  state.shopping=state.shopping.map(s=>s.id===id?{...s,cost:isNaN(n)?null:n}:s);
  save();
}
function logShopExpense(id){
  const item=state.shopping.find(s=>s.id===id); if(!item) return;
  const amount=item.cost; if(!amount||amount<=0) return;
  setState({
    budget:{...state.budget,expenses:[...state.budget.expenses,{id:uid(),label:item.text,amount}]},
    shopping:state.shopping.map(s=>s.id===id?{...s,loggedExpense:true}:s)
  });
}

// ── INSIGHTS ───────────────────────────────────────────────────────────
function renderInsights(){

    const dk=dateToKey(d);

  }
  const streak=getAllDoneStreak();
  const activeDays=days.filter(x=>x.total>0).length;
  const avgPct=activeDays?Math.round(days.reduce((a,x)=>a+x.pct,0)/activeDays):0;
  const totalExp=state.budget.expenses.reduce((a,e)=>a+e.amount,0);
  const remaining=state.budget.income-totalExp;
  const moodDays=[];
  for(let i=6;i>=0;i--){ const d=addDays(new Date(),-i); moodDays.push({d,mood:state.moodLog[dateToKey(d)]||null}); }

        <p style="margin:4px 0 0;font-size:12px;color:var(--muted2);">completion rate</p>
      </div>
      <div class="insight-card" style="text-align:center;">
        <p class="card-label" style="margin-bottom:8px;">Budget</p>
        <p style="margin:0;font-size:28px;font-weight:800;color:${remaining<0?'var(--neg-text)':'var(--accent)'};">${fmt(remaining)}</p>
        <p style="margin:4px 0 0;font-size:12px;color:var(--muted2);">remaining this month</p>
      </div>
    </div>

    <div class="insight-card" style="margin-bottom:24px;">
      <h2 class="card-label" style="margin-bottom:16px;">Last 14 days — task completion</h2>
      <div class="insight-bar-track">
        ${days.map(x=>{
          const h=x.total>0?Math.max(4,Math.round(x.pct*0.86)):3;
          const isToday=x.dk===tk;
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;height:100%;justify-content:flex-end;">
            <div class="insight-bar${x.total>0?' filled':''}${isToday?' today':''}" style="height:${h}px;width:100%;" title="${x.d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}: ${x.done}/${x.total} (${x.pct}%)"></div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:4px;margin-top:8px;">
        ${days.map(x=>`<div style="flex:1;text-align:center;font-size:10px;color:var(--muted2);font-weight:600;">${x.d.getDate()}</div>`).join('')}
      </div>
    </div>

    <div class="today-grid">
      <div class="insight-card">
        <h2 class="card-label" style="margin-bottom:14px;">Self-care streaks</h2>
        ${state.selfcare.map(h=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);">
          <span style="font-size:13.5px;font-weight:500;color:var(--text);">${esc(h.label)}</span>
          <span style="font-size:13px;font-weight:700;color:var(--accent);">${h.streak>0?'🔥 '+h.streak+' day'+(h.streak===1?'':'s'):'—'}</span>
        </div>`).join('')}

      </div>
      <div class="insight-card">
        <h2 class="card-label" style="margin-bottom:14px;">Mood, last 7 days</h2>
        <div style="display:flex;justify-content:space-between;gap:4px;">
          ${moodDays.map(m=>`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;">
            <span style="font-size:20px;">${m.mood||'—'}</span>

// Flat list for backwards compat
const STICKER_EMOJIS = STICKER_GROUPS.flatMap(g=>g.items);
let pickedSticker=null,stickerPanelOpen=false,selectedStickerId=null;

// Friendly labels for current view, shown in the picker
const VIEW_LABELS={today:'Today',week:'Week',month:'Month',goals:'Goals',budget:'Budget',meals:'Meals',shopping:'Shopping',selfcare:'Self-care',notes:'Notes',insights:'Insights'};

function getViewStickers(){ return state.stickersByView[state.view]||[]; }

function initStickerToolbar(){
  const panel=document.getElementById('stickerPanel');
  const label=VIEW_LABELS[state.view]||state.view;
  let html=`<p class="sticker-tab-note">Stickers stay on the <b>${label}</b> tab</p>`;
  STICKER_GROUPS.forEach(g=>{
    html+=`<div style="width:100%;font-size:10.5px;font-weight:700;color:var(--muted3);letter-spacing:.06em;text-transform:uppercase;padding:8px 2px 4px;border-top:1px solid var(--border2);margin-top:2px;">${g.label}</div>`;

  });
  html+=`<button class="sticker-clear" onclick="clearAllStickers()">🗑 Clear stickers on this tab</button>`;
  panel.innerHTML=html;
}
function toggleStickerPanel(){
  stickerPanelOpen=!stickerPanelOpen;
  document.getElementById('stickerPanel').classList.toggle('open',stickerPanelOpen);
  document.getElementById('stickerFab').classList.toggle('active',stickerPanelOpen);
  if(stickerPanelOpen) initStickerToolbar();
}
function pickSticker(emoji){
  pickedSticker=emoji;
  stickerPanelOpen=false;
  document.getElementById('stickerPanel').classList.remove('open');
  document.getElementById('stickerFab').classList.remove('active');
  document.getElementById('stickerFab').textContent=emoji;
  const layer=document.getElementById('stickerLayer');
  layer.classList.add('placing');
  layer.title='Click anywhere to place '+emoji;
}
function placeStickerAt(e){
  const layer=document.getElementById('stickerLayer');
  if(!layer.classList.contains('placing')||!pickedSticker) return;
  const rect=layer.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*100;
  const y=((e.clientY-rect.top)/rect.height)*100;
  const rot=(Math.random()-0.5)*30;
  const view=state.view;
  if(!state.stickersByView[view]) state.stickersByView[view]=[];
  state.stickersByView[view]=[...state.stickersByView[view],{id:uid(),emoji:pickedSticker,x,y,rot,size:32}];
  save();
  renderStickers();
  layer.classList.remove('placing');
  layer.title='';
  document.getElementById('stickerFab').textContent='🌸';
  pickedSticker=null;
}
function removeSticker(id){
  const view=state.view;
  state.stickersByView[view]=(state.stickersByView[view]||[]).filter(s=>s.id!==id);
  save();
  renderStickers();
}
function clearAllStickers(){
  state.stickersByView[state.view]=[];
  save();
  renderStickers();
  toggleStickerPanel();
}
function renderStickers(){
  const layer=document.getElementById('stickerLayer');
  layer.querySelectorAll('.sticker').forEach(e=>e.remove());
  getViewStickers().forEach(s=>{
    if(!s.size) s.size=32;
    const el=document.createElement('div');
    el.className='sticker'+(s.id===selectedStickerId?' selected':'');
    el.dataset.id=s.id;
    el.style.left=s.x+'%'; el.style.top=s.y+'%'; el.style.transform=`rotate(${s.rot}deg)`; el.style.fontSize=s.size+'px';
    el.textContent=s.emoji;
    el.title='Click to select, then drag the handles to resize or rotate • drag to move • double-click to remove';
    // The pop-in entrance animation has fill:forwards, which otherwise keeps
    // overriding the inline `transform` (and thus blocks rotation) forever.
    // Once it finishes, drop the animation so our rotate/move transforms apply.
    el.addEventListener('animationend',()=>{ el.style.animation='none'; el.style.transform=`rotate(${s.rot}deg)`; },{once:true});
    el.ondblclick=(ev)=>{ ev.stopPropagation(); removeSticker(s.id); };

    // Scroll to resize (desktop)
    el.addEventListener('wheel',(ev)=>{
      ev.preventDefault(); ev.stopPropagation();
      const delta=ev.deltaY>0?-3:3;
      s.size=Math.max(16,Math.min(140,(s.size||32)+delta));
      el.style.fontSize=s.size+'px';
      save();
    },{passive:false});

    // Drag to move (mouse + touch via pointer events)
    let dragging=false,startX,startY,origX,origY,moved=false;
    el.addEventListener('pointerdown',(ev)=>{
      if(ev.target!==el) return; // ignore handle
      dragging=true; moved=false; startX=ev.clientX; startY=ev.clientY; origX=s.x; origY=s.y;
      try{ el.setPointerCapture(ev.pointerId); }catch(err){}
      ev.preventDefault();
    });
    el.addEventListener('pointermove',(ev)=>{
      if(!dragging) return;
      const lrect=layer.getBoundingClientRect();
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      if(Math.abs(dx)>2||Math.abs(dy)>2) moved=true;
      s.x=Math.max(0,Math.min(98,origX+dx/lrect.width*100));
      s.y=Math.max(0,Math.min(96,origY+dy/lrect.height*100));
      el.style.left=s.x+'%'; el.style.top=s.y+'%';
    });
    el.addEventListener('pointerup',(ev)=>{
      if(dragging){
        dragging=false;
        if(moved) save();
        else{
          // Plain click/tap (no drag) — toggle selection to show resize/rotate handles
          selectedStickerId=(selectedStickerId===s.id)?null:s.id;
          renderStickers();
        }
        try{ el.releasePointerCapture(ev.pointerId); }catch(err){}
      }
    });

    // Resize handle (bottom-right corner)
    const handle=document.createElement('div');
    handle.className='sticker-resize-handle';
    let resizing=false,rStartX,rStartY,rOrigSize;
    handle.addEventListener('pointerdown',(ev)=>{
      resizing=true; rStartX=ev.clientX; rStartY=ev.clientY; rOrigSize=s.size||32;
      try{ handle.setPointerCapture(ev.pointerId); }catch(err){}
      ev.preventDefault(); ev.stopPropagation();
    });
    handle.addEventListener('pointermove',(ev)=>{
      if(!resizing) return;
      const delta=((ev.clientX-rStartX)+(ev.clientY-rStartY))/2;
      s.size=Math.max(16,Math.min(140,rOrigSize+delta));
      el.style.fontSize=s.size+'px';
      ev.stopPropagation();
    });
    handle.addEventListener('pointerup',(ev)=>{
      if(resizing){ resizing=false; save(); try{ handle.releasePointerCapture(ev.pointerId); }catch(err){} }
      ev.stopPropagation();
    });
    el.appendChild(handle);

    // Rotate handle (top-left corner) — drag around the sticker's center to spin it
    const rotHandle=document.createElement('div');
    rotHandle.className='sticker-rotate-handle';
    rotHandle.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v5h-5"></path></svg>';
    let rotating=false,rotStartAngle=0,rotOrigRot=0;
    rotHandle.addEventListener('pointerdown',(ev)=>{
      rotating=true;
      const r=el.getBoundingClientRect();
      const cx=r.left+r.width/2, cy=r.top+r.height/2;
      rotStartAngle=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI;
      rotOrigRot=s.rot||0;
      try{ rotHandle.setPointerCapture(ev.pointerId); }catch(err){}
      ev.preventDefault(); ev.stopPropagation();
    });
    rotHandle.addEventListener('pointermove',(ev)=>{
      if(!rotating) return;
      const r=el.getBoundingClientRect();
      const cx=r.left+r.width/2, cy=r.top+r.height/2;
      const angle=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI;
      s.rot=rotOrigRot+(angle-rotStartAngle);
      el.style.transform=`rotate(${s.rot}deg)`;
      ev.stopPropagation();
    });
    rotHandle.addEventListener('pointerup',(ev)=>{
      if(rotating){ rotating=false; save(); try{ rotHandle.releasePointerCapture(ev.pointerId); }catch(err){} }
      ev.stopPropagation();
    });
    el.appendChild(rotHandle);

    layer.appendChild(el);
  });
}
document.getElementById('stickerLayer').addEventListener('click',placeStickerAt);
// Tapping anywhere outside a sticker deselects it (hides its handles again)
document.addEventListener('pointerdown',(ev)=>{

    selectedStickerId=null;
    renderStickers();

});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js', { scope: './', updateViaCache: 'none' })
    .then(reg => {
      // If a new SW is waiting (update available), tell it to skip waiting
      // and take over immediately without a second page reload.
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        }
      });
    })
    .catch(() => {});

  // When the SW claims this client after an update, reload once to ensure
  // the freshly cached index.html is running (not the old in-memory one).
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}

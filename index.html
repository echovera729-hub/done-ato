<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sage — Personal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f4f6f1;font-family:'Manrope',-apple-system,sans-serif;color:#26352a;min-height:100vh;}
input,button,textarea{font-family:inherit;}
input::placeholder,textarea::placeholder{color:#a7b2a0;}
button{cursor:pointer;}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cfd8c8;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#b9c4ad}

@keyframes confetti-fall{0%{transform:translateY(-12px) rotate(0);opacity:0}8%{opacity:1}100%{transform:translateY(620px) rotate(540deg);opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes drawerIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* ── DESKTOP LAYOUT ─────────────────────────────── */
.app{display:flex;height:100vh;width:100%;overflow:hidden;}

/* Sidebar wrap + collapse toggle */
.sidebar-wrap{position:relative;flex:none;}
.sidebar{width:252px;flex:none;background:#fff;border-right:1px solid #e7ebe2;display:flex;flex-direction:column;padding:26px 18px 22px;transition:width .25s cubic-bezier(.4,0,.2,1),padding .25s cubic-bezier(.4,0,.2,1);overflow:hidden;height:100vh;}
.sidebar.collapsed{width:68px;padding:26px 14px 22px;}
.sidebar-toggle{position:absolute;top:50%;transform:translateY(-50%);right:-13px;width:26px;height:26px;background:#fff;border:1px solid #e7ebe2;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#8a9783;z-index:20;box-shadow:0 1px 4px rgba(40,60,40,.1);transition:color .15s,box-shadow .15s;}
.sidebar-toggle:hover{color:#3a5a40;box-shadow:0 2px 8px rgba(40,60,40,.18);}

/* Sidebar internals */
.logo{display:flex;align-items:center;gap:11px;padding:0 8px 4px;margin-bottom:22px;white-space:nowrap;overflow:hidden;}
.logo-icon{width:38px;height:38px;flex:none;background:#3a5a40;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-leaf{width:15px;height:15px;background:#dad7cd;border-radius:0 100% 0 100%;transform:rotate(-12deg);}
.logo-text{display:flex;flex-direction:column;line-height:1.1;transition:opacity .2s,width .25s;overflow:hidden;}
.sidebar.collapsed .logo-text{opacity:0;width:0;}
.logo-name{font-family:'Newsreader',serif;font-size:21px;font-weight:500;color:#2a3a2e;}
.logo-sub{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#9aa792;font-weight:600;}

nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.nav-btn{position:relative;display:flex;align-items:center;gap:13px;width:100%;padding:11px 13px;border:none;background:transparent;border-radius:12px;text-align:left;color:#46553f;transition:background .15s;white-space:nowrap;overflow:hidden;}
.nav-btn:hover{background:#f2f5ee;}
.nav-btn.active{background:#e9efe1;}
.nav-icon{position:relative;display:flex;width:22px;flex:none;justify-content:center;color:#5d7257;}
.nav-label{position:relative;font-size:14.5px;font-weight:600;transition:opacity .2s;}
.sidebar.collapsed .nav-label{opacity:0;width:0;overflow:hidden;}
.sidebar.collapsed .nav-btn{justify-content:center;gap:0;padding:11px 0;}

.sidebar-footer{margin-top:auto;padding:14px 13px 4px;border-top:1px solid #eef1ea;overflow:hidden;}
.footer-date{margin:0 0 3px;font-size:12.5px;color:#8a9783;font-weight:600;white-space:nowrap;}
.footer-tasks{margin:0;font-size:13px;color:#3a5a40;font-weight:700;white-space:nowrap;}
.sidebar.collapsed .sidebar-footer{opacity:0;pointer-events:none;}

/* Main content */
.main{flex:1;min-width:0;overflow-y:auto;background:#f4f6f1;}
.main-inner{max-width:1060px;margin:0 auto;padding:46px 52px 90px;}

/* Mobile top bar (hidden on desktop) */
.mobile-topbar{display:none;}
/* Mobile bottom nav (hidden on desktop) */
.mobile-bottomnav{display:none;}
/* Tablet drawer overlay (hidden on desktop) */
.drawer-overlay{display:none;}

/* ── CARDS & SHARED COMPONENTS ──────────────────── */
.card{background:#fff;border:1px solid #e7ebe2;border-radius:18px;padding:26px;box-shadow:0 1px 2px rgba(40,60,40,.04),0 14px 30px -22px rgba(40,60,40,.18);}
.card-sm{background:#fff;border:1px solid #e7ebe2;border-radius:16px;}
.section-eyebrow{font-size:12.5px;letter-spacing:.15em;text-transform:uppercase;color:#8a9783;margin:0 0 7px;font-weight:700;}
.section-title{font-family:'Newsreader',serif;font-weight:400;font-size:40px;margin:0 0 6px;color:#2a3a2e;}
.section-sub{font-size:15px;color:#8a9783;margin:0 0 28px;}
.card-label{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#7d8a78;font-weight:700;margin:0;}
.inp{padding:12px 15px;border:1px solid #dde3d6;border-radius:11px;font-size:14.5px;outline:none;color:#2a3a2e;background:#fafbf8;transition:border-color .15s,background .15s;}
.inp:focus{border-color:#a3b18a;background:#fff;}
.inp-lg{padding:13px 16px;border-radius:12px;font-size:15px;background:#fff;}
.inp-lg:focus{border-color:#a3b18a;}
.btn-primary{border:none;background:#3a5a40;color:#fff;border-radius:11px;font-size:14.5px;font-weight:600;padding:0 20px;transition:background .15s;}
.btn-primary:hover{background:#33503a;}
.btn-primary-lg{border-radius:12px;}
.btn-icon-add{flex:none;width:44px;height:44px;border:none;background:#3a5a40;color:#fff;border-radius:11px;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.btn-icon-add:hover{background:#33503a;}
.btn-remove{width:26px;height:26px;border:none;background:transparent;color:#bcc6b4;border-radius:7px;font-size:17px;line-height:1;transition:background .15s,color .15s;}
.btn-remove:hover{background:#f0ebe9;color:#b46a6a;}
.view{animation:rise .2s ease;}

/* Today grid */
.today-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:24px;align-items:start;}
/* Budget grid */
.budget-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:26px;}
/* Self-care grid */
.selfcare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
/* Notes masonry */
.notes-masonry{columns:3;column-gap:16px;}
/* Week grid */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
/* Month grid */
.month-header-row{display:grid;grid-template-columns:repeat(7,1fr);}
.month-week-row{display:grid;grid-template-columns:repeat(7,1fr);}

/* ── TABLET (768–1023px) ─────────────────────────── */
@media(max-width:1023px) and (min-width:768px){
  /* Hide desktop sidebar toggle, show overlay drawer instead */
  .sidebar-wrap{display:none;}
  .sidebar-toggle{display:none;}

  /* Tablet top bar */
  .mobile-topbar{
    display:flex;align-items:center;justify-content:space-between;
    background:#fff;border-bottom:1px solid #e7ebe2;
    padding:14px 20px;position:sticky;top:0;z-index:30;flex:none;
  }
  .topbar-logo{display:flex;align-items:center;gap:10px;}
  .topbar-hamburger{width:38px;height:38px;border:none;background:transparent;color:#5d7257;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .topbar-hamburger:hover{background:#f2f5ee;}

  /* Drawer overlay */
  .drawer-overlay{
    display:block;position:fixed;inset:0;z-index:40;
    background:rgba(40,60,40,.35);opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .drawer-overlay.open{opacity:1;pointer-events:all;}

  /* Drawer panel */
  .drawer-panel{
    position:fixed;top:0;left:0;bottom:0;width:260px;
    background:#fff;border-right:1px solid #e7ebe2;z-index:50;
    display:flex;flex-direction:column;padding:26px 18px 22px;
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  .drawer-overlay.open .drawer-panel{transform:translateX(0);}

  .app{flex-direction:column;height:100vh;overflow:hidden;}
  .main{flex:1;overflow-y:auto;}
  .main-inner{padding:32px 28px 80px;max-width:100%;}

  .today-grid{grid-template-columns:1fr;}
  .budget-summary{grid-template-columns:1fr 1fr;}
  .selfcare-grid{grid-template-columns:1fr 1fr;}
  .notes-masonry{columns:2;}
  .week-grid{grid-template-columns:repeat(4,1fr);}
  .section-title{font-size:32px;}
}

/* ── MOBILE (< 768px) ───────────────────────────── */
@media(max-width:767px){
  .sidebar-wrap{display:none;}
  .sidebar-toggle{display:none;}

  /* Mobile top bar */
  .mobile-topbar{
    display:flex;align-items:center;justify-content:space-between;
    background:#fff;border-bottom:1px solid #e7ebe2;
    padding:14px 16px;position:sticky;top:0;z-index:30;flex:none;
  }
  .topbar-logo{display:flex;align-items:center;gap:9px;}
  .topbar-hamburger{width:36px;height:36px;border:none;background:transparent;color:#5d7257;border-radius:10px;display:flex;align-items:center;justify-content:center;}

  /* Drawer overlay */
  .drawer-overlay{
    display:block;position:fixed;inset:0;z-index:40;
    background:rgba(40,60,40,.4);opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .drawer-overlay.open{opacity:1;pointer-events:all;}
  .drawer-panel{
    position:fixed;top:0;left:0;bottom:0;width:240px;
    background:#fff;border-right:1px solid #e7ebe2;z-index:50;
    display:flex;flex-direction:column;padding:22px 14px 80px;
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    overflow-y:auto;
  }
  .drawer-overlay.open .drawer-panel{transform:translateX(0);}

  .app{flex-direction:column;height:100vh;overflow:hidden;}
  .main{flex:1;overflow-y:auto;}
  .main-inner{padding:20px 16px 96px;max-width:100%;}

  /* Bottom navigation bar */
  .mobile-bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:#fff;border-top:1px solid #e7ebe2;
    padding:0 4px env(safe-area-inset-bottom,0);
    height:64px;align-items:stretch;
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;border:none;background:transparent;color:#7d8a78;padding:6px 2px;
    font-size:10px;font-weight:600;letter-spacing:.03em;transition:color .15s;
    border-top:2px solid transparent;
  }
  .bnav-btn.active{color:#3a5a40;border-top-color:#3a5a40;}
  .bnav-btn svg{flex:none;}

  /* Layout overrides */
  .today-grid{grid-template-columns:1fr;}
  .budget-summary{grid-template-columns:1fr;}
  .selfcare-grid{grid-template-columns:1fr;}
  .notes-masonry{columns:1;}
  .week-grid{grid-template-columns:1fr;}
  .section-title{font-size:28px;}
  .section-sub{font-size:14px;margin-bottom:20px;}
  .card{padding:18px;}
  .main-inner{padding:18px 14px 96px;}

  /* Month calendar smaller cells */
  .month-week-row .mcell{min-height:52px;padding:6px 4px;}
  .month-header-row span{font-size:11px;padding:10px 0;}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ── DESKTOP SIDEBAR ── -->
  <div class="sidebar-wrap" id="sidebarWrap">
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <span class="logo-icon"><span class="logo-leaf"></span></span>
        <span class="logo-text">
          <span class="logo-name">Sage</span>
          <span class="logo-sub">Planner</span>
        </span>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-footer">
        <p class="footer-date" id="footerDate"></p>
        <p class="footer-tasks" id="footerTasks"></p>
      </div>
    </aside>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle sidebar">
      <svg id="toggleIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
    </button>
  </div>

  <!-- ── MOBILE / TABLET TOP BAR ── -->
  <div class="mobile-topbar">
    <div class="topbar-logo">
      <span class="logo-icon" style="width:34px;height:34px;border-radius:9px;"><span class="logo-leaf"></span></span>
      <span style="font-family:'Newsreader',serif;font-size:19px;font-weight:500;color:#2a3a2e;">Sage</span>
    </div>
    <button class="topbar-hamburger" onclick="openDrawer()" title="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
  </div>

  <!-- ── DRAWER OVERLAY (mobile + tablet) ── -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="logo" style="margin-bottom:18px;">
        <span class="logo-icon"><span class="logo-leaf"></span></span>
        <span class="logo-text">
          <span class="logo-name">Sage</span>
          <span class="logo-sub">Planner</span>
        </span>
      </div>
      <nav id="drawerNav"></nav>
      <div style="margin-top:auto;padding:14px 8px 4px;border-top:1px solid #eef1ea;">
        <p class="footer-date" id="drawerDate"></p>
        <p class="footer-tasks" id="drawerTasks"></p>
      </div>
    </div>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <main class="main">
    <div class="main-inner" id="mainContent"></div>
  </main>

  <!-- ── MOBILE BOTTOM NAV ── -->
  <nav class="mobile-bottomnav" id="bottomNav"></nav>
</div>

<div id="confetti" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999;"></div>

<script>
const KEY = 'sage_planner_v1';
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const QUOTES = [
  "Small steps, taken daily, become the path.",
  "Progress is quiet. Keep showing up.",
  "You don't have to do it all — just the next thing.",
  "A calm mind plans the clearest day.",
  "Done is kinder than perfect.",
  "Tend to today, and tomorrow follows.",
  "Your pace is the right pace.",
  "Begin where you are, with what you have.",
  "Rest is part of the work.",
  "What you water, grows.",
  "One good hour can change a whole day.",
  "Gentle and steady carries you far.",
  "Clarity comes from starting, not waiting.",
  "Make room for what matters most.",
  "Today is enough to focus on."
];

function uid(){ return Math.random().toString(36).slice(2,9); }

function defaultState(){
  const week={}, weekDraft={}, meals={};
  DAYS.forEach(d=>{ week[d]=[]; weekDraft[d]=''; meals[d]={b:'',l:'',d:''}; });
  return {
    view:'today', userName:'',
    tasks:[
      {id:uid(),text:'Morning walk',done:true,priority:false},
      {id:uid(),text:'Reply to emails',done:false,priority:true},
      {id:uid(),text:'Plan the week ahead',done:false,priority:false}
    ],
    taskDraft:'', week, weekDraft,
    goals:[
      {id:uid(),text:'Read 2 books',progress:40},
      {id:uid(),text:'Walk 10k steps daily',progress:65}
    ],
    goalDraft:'',
    budget:{income:3200,expenses:[
      {id:uid(),label:'Rent',amount:1200},
      {id:uid(),label:'Groceries',amount:280}
    ]},
    expLabel:'', expAmount:'', meals,
    shopping:[
      {id:uid(),text:'Spinach',done:false},
      {id:uid(),text:'Olive oil',done:false},
      {id:uid(),text:'Oats',done:true}
    ],
    shopDraft:'',
    selfcare:[
      {id:uid(),label:'Drink water',done:false,streak:3},
      {id:uid(),label:'10 min stretch',done:false,streak:5},
      {id:uid(),label:'Read before bed',done:false,streak:2}
    ],
    scDraft:'',
    notes:[{id:uid(),title:'Ideas',body:'Start a small herb garden on the balcony — basil, mint, thyme.',date:'Jun 12'}],
    noteTitleDraft:'', noteBodyDraft:''
  };
}

let state;
try { const s=localStorage.getItem(KEY); const p=JSON.parse(s); state=(p&&p.week&&p.meals)?p:defaultState(); }
catch(e){ state=defaultState(); }

let prevAllDone = allDone();
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
function setState(patch){ Object.assign(state,patch); save(); maybeCelebrate(); render(); }
function allDone(){ return state.tasks.length>0 && state.tasks.every(t=>t.done); }
function maybeCelebrate(){ const now=allDone(); if(now&&!prevAllDone) spawnConfetti(); prevAllDone=now; }

function spawnConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#3a5a40','#588157','#a3b18a','#dad7cd','#94a187'];
  for(let i=0;i<64;i++){
    const p=document.createElement('div');
    const size=6+Math.random()*8;
    p.style.cssText='position:absolute;top:-14px;left:'+(Math.random()*100)+'%;width:'+size+'px;height:'+(size*0.55)+'px;background:'+colors[i%colors.length]+';border-radius:2px;opacity:0;animation:confetti-fall '+(1.7+Math.random()*1.5)+'s cubic-bezier(.25,.7,.35,1) '+(Math.random()*0.5)+'s forwards;';
    c.appendChild(p);
    setTimeout(()=>{ if(p.parentNode) p.parentNode.removeChild(p); },3600);
  }
}

function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── VIEWS ──────────────────────────────────────────────────────────────────
const VIEWS = [
  {key:'today',    label:'Today',    icon:'<circle cx="12" cy="12" r="9"></circle><path d="m8.4 12 2.6 2.6 4.6-5.2"></path>'},
  {key:'week',     label:'Week',     icon:'<rect x="3.5" y="4.5" width="17" height="16" rx="2.5"></rect><path d="M3.5 9h17M8 3v3M16 3v3"></path>'},
  {key:'month',    label:'Month',    icon:'<rect x="3" y="4" width="18" height="17" rx="2.5"></rect><path d="M3 9h18M8 3v3M16 3v3M7 13h2M11 13h2M15 13h2M7 17h2M11 17h2M15 17h2"></path>'},
  {key:'goals',    label:'Goals',    icon:'<circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="5"></circle><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"></circle>'},
  {key:'budget',   label:'Budget',   icon:'<rect x="3" y="6" width="18" height="13" rx="2.5"></rect><path d="M3 10h18"></path><circle cx="16.5" cy="14" r="1.1" fill="currentColor" stroke="none"></circle>'},
  {key:'meals',    label:'Meals',    icon:'<path d="M4 11h16a8 8 0 0 1-16 0z"></path><path d="M9.2 5.2c-.6-1-.4-1.8.2-2.7M13 5.2c-.6-1-.4-1.8.2-2.7"></path>'},
  {key:'shopping', label:'Shopping', icon:'<path d="M5 8h14l-1.1 11.5a1 1 0 0 1-1 .9H7.1a1 1 0 0 1-1-.9L5 8z"></path><path d="M8.5 8V6.2a3.5 3.5 0 0 1 7 0V8"></path>'},
  {key:'selfcare', label:'Self-care',icon:'<path d="M12 20s-6.6-4.3-9-8C1.4 9.4 2.6 6 5.9 6c1.8 0 3 1.1 3.7 2.1C10.3 7.1 11.5 6 13.3 6c3.3 0 4.5 3.4 2.9 6-2.4 3.7-9.2 8-4.2 8z"></path>'},
  {key:'notes',    label:'Notes',    icon:'<rect x="5.5" y="3.5" width="14" height="17" rx="2"></rect><path d="M9 8.5h6M9 12h6M9 15.5h4M5.5 7H4M5.5 12H4M5.5 17H4"></path>'}
];

// Bottom nav shows first 5 most-used views
const BOTTOM_VIEWS = ['today','week','month','shopping','notes'];

function svgIcon(icon, size=20){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${icon}</svg>`;
}

function renderNav(){
  const navHtml = VIEWS.map(v=>`
    <button class="nav-btn${state.view===v.key?' active':''}" onclick="goView('${v.key}')" title="${v.label}">
      <span class="nav-icon">${svgIcon(v.icon)}</span>
      <span class="nav-label">${v.label}</span>
    </button>`).join('');
  if(document.getElementById('nav')) document.getElementById('nav').innerHTML = navHtml;

  // Drawer nav (mobile/tablet)
  const drawerHtml = VIEWS.map(v=>`
    <button class="nav-btn${state.view===v.key?' active':''}" onclick="goView('${v.key}');closeDrawer();" title="${v.label}">
      <span class="nav-icon">${svgIcon(v.icon)}</span>
      <span class="nav-label">${v.label}</span>
    </button>`).join('');
  if(document.getElementById('drawerNav')) document.getElementById('drawerNav').innerHTML = drawerHtml;

  // Bottom nav (mobile only — 5 tabs)
  const bn = document.getElementById('bottomNav');
  if(bn){
    bn.innerHTML = BOTTOM_VIEWS.map(key=>{
      const v = VIEWS.find(x=>x.key===key);
      return `<button class="bnav-btn${state.view===key?' active':''}" onclick="goView('${key}')">
        ${svgIcon(v.icon,22)}
        <span>${v.label}</span>
      </button>`;
    }).join('');
  }
}

function goView(v){ setState({view:v}); }

// ── SIDEBAR COLLAPSE (desktop only) ─────────────────────────────────────
let sidebarCollapsed = false;
function toggleSidebar(){
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  const icon = document.getElementById('toggleIcon');
  if(!sb) return;
  sb.classList.toggle('collapsed', sidebarCollapsed);
  icon.innerHTML = sidebarCollapsed ? '<path d="M9 18l6-6-6-6"></path>' : '<path d="M15 18l-6-6 6-6"></path>';
}

function removeTask(id){ setState({tasks:state.tasks.filter(t=>t.id!==id)}); }

// ── MONTH ───────────────────────────────────────────────────────────────
function renderMonth(){
  const now=new Date(), year=now.getFullYear(), month=now.getMonth();
  const monthName=now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const firstDay=new Date(year,month,1).getDay();
  const startOffset=(firstDay+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=now.getDate();
  const cells=[]; for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `
  <div class="view">
    <h1 class="section-title">${monthName}</h1>
    <p class="section-sub">Your month at a glance.</p>
    <div class="card-sm" style="overflow:hidden;">
      <div class="month-header-row" style="background:#f3f6ef;border-bottom:1px solid #e7ebe2;">
        ${dayNames.map(d=>`<span style="padding:12px 0;text-align:center;font-size:12px;font-weight:700;color:#7d8a78;letter-spacing:.04em;display:block;">${d}</span>`).join('')}
      </div>
      ${(()=>{
        let rows='';
        for(let r=0;r<cells.length/7;r++){
          rows+=`<div class="month-week-row" style="border-bottom:1px solid #f0f2ec;">`;
          for(let c=0;c<7;c++){
            const day=cells[r*7+c];
            const isToday=day===today;
            const isWeekend=c>=5;
            rows+=`<div class="mcell" style="min-height:72px;padding:8px 10px;border-right:${c<6?'1px solid #f0f2ec':'none'};background:${isToday?'#f0f5ec':'#fff'};">
              ${day?`<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:${isToday?'800':'600'};color:${isToday?'#fff':isWeekend?'#9aa792':'#3f5343'};background:${isToday?'#3a5a40':'transparent'};">${day}</span>`:''}
            </div>`;
          }
          rows+=`</div>`;
        }
        return rows;
      })()}
    </div>
  </div>`;
}

}
function setMeal(day,slot,val){ state.meals[day][slot]=val; save(); }

// ── SHOPPING ─────────────────────────────────────────────────────────────
function renderShopping(){
  const shopRemaining=state.shopping.filter(x=>!x.done).length;
  const hasChecked=state.shopping.some(x=>x.done);
  const label=shopRemaining===0?'All gathered':(shopRemaining+' item'+(shopRemaining===1?'':'s')+' to get');
  return `
  <div class="view" style="max-width:620px;">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
      <div>
        <h1 class="section-title">Shopping list</h1>
        <p class="section-sub" style="margin:0;">${label}</p>
      </div>
      ${hasChecked?`<button onclick="clearChecked()" style="flex:none;padding:9px 14px;border:1px solid #dde3d6;background:#fff;color:#5d7257;border-radius:10px;font-size:13px;font-weight:600;">Clear checked</button>`:''}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:18px;">
      <input id="shopInp" class="inp inp-lg" value="${esc(state.shopDraft)}" placeholder="Add an item…"
        style="flex:1;min-width:0;" oninput="state.shopDraft=this.value" onkeydown="if(event.key==='Enter'){addShop();}">
      <button class="btn-icon-add" style="border-radius:12px;width:48px;" onclick="addShop()">+</button>
    </div>
    <div class="card-sm">
      ${state.shopping.map(it=>`
      <div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f0f2ec;">
        <button onclick="toggleShop('${it.id}')" style="flex:none;width:23px;height:23px;border-radius:7px;border:2px solid ${it.done?'#3a5a40':'#c2cdb9'};background:${it.done?'#3a5a40':'#fff'};display:flex;align-items:center;justify-content:center;padding:0;transition:all .2s;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:${it.done?1:0};"><path d="m5 12.5 4.5 4.5L19 7"></path></svg>
        </button>
        <span style="flex:1;font-size:15px;font-weight:500;color:${it.done?'#aab5a3':'#2a3a2e'};text-decoration:${it.done?'line-through':'none'};">${esc(it.text)}</span>
        <button class="btn-remove" onclick="removeShop('${it.id}')">×</button>
      </div>`).join('')}
      ${state.shopping.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14px;padding:22px;margin:0;">Your list is empty.</p>`:''}
    </div>
  </div>`;
}
function addShop(){ const t=state.shopDraft.trim(); if(!t) return; setState({shopping:[...state.shopping,{id:uid(),text:t,done:false}],shopDraft:''}); }
function toggleShop(id){ setState({shopping:state.shopping.map(s=>s.id===id?{...s,done:!s.done}:s)}); }
function removeShop(id){ setState({shopping:state.shopping.filter(s=>s.id!==id)}); }
function clearChecked(){ setState({shopping:state.shopping.filter(s=>!s.done)}); }

// ── SELF-CARE ────────────────────────────────────────────────────────────
function renderSelfcare(){
  return `
  <div class="view" style="max-width:720px;">
    <h1 class="section-title">Self-care</h1>
    <p class="section-sub">Gentle habits, kept up day by day.</p>
    <div style="display:flex;gap:8px;margin-bottom:22px;">
      <input id="scInp" class="inp inp-lg" value="${esc(state.scDraft)}" placeholder="Add a habit to nurture"
        style="flex:1;min-width:0;" oninput="state.scDraft=this.value" onkeydown="if(event.key==='Enter'){addSelfcare();}">
      <button class="btn-primary btn-primary-lg" style="flex:none;padding:0 20px;height:48px;" onclick="addSelfcare()">Add</button>
    </div>
    <div class="selfcare-grid">
      ${state.selfcare.map(h=>`
      <div style="background:${h.done?'#eef2e8':'#fff'};border:1px solid ${h.done?'#cdd9c2':'#e7ebe2'};border-radius:15px;padding:16px 18px;display:flex;flex-direction:column;gap:13px;transition:all .2s;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
          <div>
            <p style="font-size:15px;font-weight:600;color:#2a3a2e;margin:0 0 5px;">${esc(h.label)}</p>
            <p style="font-size:12.5px;color:#7d8a78;font-weight:600;margin:0;">${h.streak>0?(h.streak+' day streak'):'Start your streak'}</p>
          </div>
          <button class="btn-remove" onclick="removeSelfcare('${h.id}')">×</button>
        </div>
        <button onclick="toggleSelfcare('${h.id}')" style="width:100%;padding:9px;border-radius:10px;border:1px solid ${h.done?'#3a5a40':'#dde3d6'};background:${h.done?'#3a5a40':'#fff'};color:${h.done?'#fff':'#5d7257'};font-weight:600;font-size:13.5px;font-family:inherit;transition:all .2s;">${h.done?'Done today ✓':'Mark done'}</button>
      </div>`).join('')}
    </div>
    ${state.selfcare.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14px;padding:30px 0;margin:0;">Add a habit above to start a streak.</p>`:''}
  </div>`;
}
function addSelfcare(){ const t=state.scDraft.trim(); if(!t) return; setState({selfcare:[...state.selfcare,{id:uid(),label:t,done:false,streak:0}],scDraft:''}); }
function toggleSelfcare(id){ setState({selfcare:state.selfcare.map(h=>h.id===id?{...h,done:!h.done,streak:Math.max(0,h.streak+(h.done?-1:1))}:h)}); }
function removeSelfcare(id){ setState({selfcare:state.selfcare.filter(h=>h.id!==id)}); }

// ── NOTES ────────────────────────────────────────────────────────────────
function renderNotes(){
  return `
  <div class="view">
    <h1 class="section-title">Notes</h1>
    <p class="section-sub">Jot down thoughts, ideas and reminders.</p>
    <div class="card" style="margin-bottom:22px;max-width:640px;">
      <input id="noteTitleInp" value="${esc(state.noteTitleDraft)}" placeholder="Note title"
        style="width:100%;border:none;outline:none;font-size:16px;font-weight:700;color:#2a3a2e;background:transparent;margin-bottom:8px;font-family:'Newsreader',serif;"
        oninput="state.noteTitleDraft=this.value">
      <textarea id="noteBodyInp" placeholder="Write something..." rows="2"
        style="width:100%;border:none;outline:none;font-size:14px;color:#3f5343;background:transparent;resize:none;font-family:inherit;line-height:1.5;"
        oninput="state.noteBodyDraft=this.value">${esc(state.noteBodyDraft)}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn-primary" style="padding:9px 18px;" onclick="addNote()">Save note</button>
      </div>
    </div>
    <div class="notes-masonry">
      ${state.notes.map(n=>`
      <div style="break-inside:avoid;background:#fff;border:1px solid #e7ebe2;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(40,60,40,.04);">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;">
          <p style="font-family:'Newsreader',serif;font-size:17px;font-weight:600;color:#2a3a2e;margin:0;line-height:1.2;">${esc(n.title)}</p>
          <button class="btn-remove" onclick="removeNote('${n.id}')">×</button>
        </div>
        <p style="font-size:13.5px;color:#4f6152;line-height:1.55;margin:0 0 10px;white-space:pre-wrap;">${esc(n.body)}</p>
        <p style="font-size:11.5px;color:#a7b2a0;font-weight:600;margin:0;">${n.date}</p>
      </div>`).join('')}
    </div>
    ${state.notes.length===0?`<p style="text-align:center;color:#a7b2a0;font-size:14px;padding:20px 0;margin:0;">No notes yet — your first one will appear here.</p>`:''}
  </div>`;
}
function addNote(){ const t=state.noteTitleDraft.trim(), b=state.noteBodyDraft.trim(); if(!t&&!b) return; const d=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}); setState({notes:[{id:uid(),title:t||'Untitled',body:b,date:d},...state.notes],noteTitleDraft:'',noteBodyDraft:''}); }
function removeNote(id){ setState({notes:state.notes.filter(n=>n.id!==id)}); }

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  renderNav();
  // Footer (desktop sidebar + drawer)
  const now=new Date(), dateStr=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const total=state.tasks.length, done=state.tasks.filter(t=>t.done).length;
  const taskStr=done+' of '+total+' tasks done';
  ['footerDate','drawerDate'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=dateStr; });
  ['footerTasks','drawerTasks'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=taskStr; });
  // Content
  const views={today:renderToday,week:renderWeek,month:renderMonth,goals:renderGoals,budget:renderBudget,meals:renderMeals,shopping:renderShopping,selfcare:renderSelfcare,notes:renderNotes};
  document.getElementById('mainContent').innerHTML=(views[state.view]||renderToday)();
}

render();
</script>
</body>
</html>
